<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FarmTwin — Tree Counter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#1c2129;--sur3:#21262d;
  --bdr:#30363d;--bdr2:#484f58;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --ok:#3fb950;--info:#58a6ff;--warn:#d29922;--err:#f85149;
  --r:8px;--rs:5px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
#map{position:fixed;inset:0;z-index:0}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--sur);
  border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;
  padding:0 12px;z-index:600;flex-wrap:nowrap;overflow-x:auto}
.logo{font-weight:700;font-size:14px;color:var(--tx);margin-right:4px;white-space:nowrap}
.logo span{color:var(--ok)}
.btn{height:28px;padding:0 10px;border-radius:var(--rs);border:1px solid var(--bdr2);
  background:var(--sur2);color:var(--tx2);cursor:pointer;font-size:12px;white-space:nowrap;
  transition:background .15s,color .15s}
.btn:hover,.btn.on{background:var(--sur3);color:var(--tx);border-color:var(--bdr)}
.btn.primary{background:#1a3a1a;border-color:var(--ok);color:var(--ok)}
.btn.primary:hover{background:#1f4a1f}
.btn.danger{background:#3a1a1a;border-color:var(--err);color:var(--err)}
.sep{width:1px;height:20px;background:var(--bdr);flex-shrink:0}
#server-status{font-size:11px;padding:3px 8px;border-radius:var(--rs);flex-shrink:0}
#server-status.ok{background:#0d2c1a;color:var(--ok);border:1px solid var(--ok)}
#server-status.err{background:#2c0d0d;color:var(--err);border:1px solid var(--err)}
#server-status.checking{background:var(--sur2);color:var(--tx3);border:1px solid var(--bdr)}

/* ── Tool indicator ── */
#tool-label{font-size:11px;color:var(--tx3);padding:3px 8px;
  background:var(--sur2);border-radius:var(--rs);border:1px solid var(--bdr);flex-shrink:0}

/* ── Results panel ── */
#panel{position:fixed;top:56px;right:12px;width:320px;
  background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r);
  z-index:500;display:flex;flex-direction:column;max-height:calc(100vh - 70px);
  box-shadow:0 8px 32px #0008;overflow:hidden}
#panel-head{padding:10px 13px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#panel-body{flex:1;overflow-y:auto;padding:10px 13px}
.sec-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--tx3);margin:10px 0 5px}
.sec-h:first-child{margin-top:0}

/* ── Progress bar ── */
#progress-wrap{padding:8px 13px;border-top:1px solid var(--bdr);flex-shrink:0;display:none}
#progress-bar-bg{height:4px;background:var(--sur3);border-radius:2px;overflow:hidden}
#progress-bar{height:4px;background:var(--info);width:0;transition:width .3s;border-radius:2px}
#progress-msg{font-size:10px;color:var(--tx3);margin-top:4px}

/* ── Summary cards ── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.stat-card{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);
  padding:8px;text-align:center}
.stat-card .val{font-size:20px;font-weight:700;line-height:1.2}
.stat-card .lbl{font-size:9px;color:var(--tx3);margin-top:2px}
.stat-card.alive .val{color:var(--ok)}
.stat-card.missing .val{color:var(--err)}
.stat-card.total .val{color:var(--info)}

/* ── Patch table ── */
.patch-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.patch-table th{padding:4px 6px;text-align:left;color:var(--tx3);font-size:9px;
  text-transform:uppercase;border-bottom:1px solid var(--bdr);font-weight:600}
.patch-table td{padding:5px 6px;border-bottom:1px solid var(--bdr2)}
.patch-table tr:last-child td{border-bottom:none}
.patch-table tr:hover td{background:var(--sur2);cursor:pointer}
.miss-badge{display:inline-block;background:#3a1a1a;color:var(--err);
  border-radius:var(--rs);padding:1px 5px;font-size:10px;font-weight:700}
.ok-badge{display:inline-block;background:#0d2c1a;color:var(--ok);
  border-radius:var(--rs);padding:1px 5px;font-size:10px}
.conf-bar{display:inline-block;height:4px;border-radius:2px;background:var(--info);vertical-align:middle}

/* ── Mode instructions ── */
#mode-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r);
  padding:8px 16px;font-size:12px;color:var(--tx2);z-index:500;
  pointer-events:none;display:none;box-shadow:0 4px 16px #0006}

/* ── Leaflet custom markers ── */
.tree-alive{width:10px;height:10px;border-radius:50%;background:#3fb950;
  border:1.5px solid #fff;opacity:.85}
.tree-missing{width:12px;height:12px;position:relative}
.tree-missing::before,.tree-missing::after{content:'';position:absolute;
  top:50%;left:50%;width:10px;height:2px;background:#f85149;transform-origin:center}
.tree-missing::before{transform:translate(-50%,-50%) rotate(45deg)}
.tree-missing::after{transform:translate(-50%,-50%) rotate(-45deg)}
.tree-manual{width:10px;height:10px;border-radius:50%;background:#facc15;
  border:1.5px solid #fff;opacity:.9}
.patch-label{background:transparent;border:none;font-size:10px;font-weight:700;
  color:#fff;text-shadow:0 1px 3px #000;pointer-events:none}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button,input,select{font-family:inherit}
input{background:var(--sur2);border:1px solid var(--bdr2);border-radius:var(--rs);
  color:var(--tx);padding:3px 7px;font-size:12px}
input:focus{outline:none;border-color:var(--info)}
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <span class="logo">Farm<span>Twin</span> · Tree Counter</span>
  <div class="sep"></div>
  <input id="server-url" value="" placeholder="https://your-app.railway.app"
    style="width:220px" title="Cloud server URL"
    oninput="SERVER=this.value.trim();localStorage.setItem('tc_server',SERVER);checkServer()">
  <div id="server-status" class="checking">⟳ Checking...</div>
  <div class="sep"></div>
  <button class="btn" id="btn-draw" onclick="startDraw()">✏ Draw area</button>
  <button class="btn" id="btn-import" onclick="importZones()">⬇ Import FarmTwin zones</button>
  <button class="btn primary" id="btn-analyze" onclick="analyzeAll()" disabled>▶ Analyze</button>
  <button class="btn" onclick="startCorrect()" id="btn-correct" title="Add/remove trees manually" style="display:none">✎ Correct</button>
  <button class="btn danger" onclick="clearAll()" title="Clear all">✕ Clear</button>
  <div class="sep"></div>
  <div id="tool-label">Select draw tool</div>
  <div class="sep"></div>
  <input id="proj-id" value="mafraq-farm-1" placeholder="Project ID" style="width:130px" title="FarmTwin project ID for zone import">
  <button class="btn" onclick="exportCSV()" id="btn-export" style="display:none">⬇ CSV</button>
</div>

<!-- Results panel -->
<div id="panel" style="display:none">
  <div id="panel-head">
    <span style="font-weight:700;font-size:13px">Results</span>
    <button class="btn" onclick="document.getElementById('panel').style.display='none'">✕</button>
  </div>
  <div id="panel-body"></div>
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-msg"></div>
  </div>
</div>

<!-- Mode hint -->
<div id="mode-hint"></div>

<!-- Map -->
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DEFAULT_SERVER = localStorage.getItem('tc_server') || '';
let SERVER = DEFAULT_SERVER;

// ── Map init ──────────────────────────────────────────────────────────
const map = L.map('map', {zoomControl: true}).setView([32.495, 36.168], 16);
L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
  maxZoom: 21, attribution: '© Google'
}).addTo(map);

// ── State ─────────────────────────────────────────────────────────────
let mode = 'idle'; // idle | draw | correct-add | correct-remove
let drawPts = [];
let drawPolyline = null;
let analysisAreas = [];   // [{polygon, layer, label}]
let resultLayers = [];    // Leaflet layers showing results
let markerLayers = [];    // individual tree markers
let allResults = null;
let progressTimer = null;
let correctionMarkers = []; // manually added/removed markers

// ── Server status check ───────────────────────────────────────────────
// Restore saved server URL
const savedUrl = localStorage.getItem('tc_server') || '';
if (savedUrl) {
  document.getElementById('server-url').value = savedUrl;
  SERVER = savedUrl;
}

async function checkServer() {
  const el = document.getElementById('server-status');
  if (!SERVER) {
    el.className = 'err';
    el.textContent = '● Enter server URL';
    return;
  }
  el.className = 'checking';
  el.textContent = '⟳ Waking server...';
  try {
    const r = await fetch(SERVER + '/ping', {signal: AbortSignal.timeout(35000)});
    const d = await r.json();
    if (d.ok) { el.className = 'ok'; el.textContent = '● Server ready'; }
  } catch {
    el.className = 'err';
    el.textContent = '● Unreachable';
  }
}
checkServer();
setInterval(checkServer, 10000);

// ── Tool label ────────────────────────────────────────────────────────
function setToolLabel(msg) {
  document.getElementById('tool-label').textContent = msg;
}
function showHint(msg) {
  const el = document.getElementById('mode-hint');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── Draw mode ─────────────────────────────────────────────────────────
function startDraw() {
  mode = 'draw';
  drawPts = [];
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  map.getContainer().style.cursor = 'crosshair';
  setToolLabel('Draw area — click to add points, double-click to finish');
  showHint('Click to add points · Double-click to finish · Esc to cancel');
  document.getElementById('btn-draw').classList.add('on');
}

function cancelDraw() {
  mode = 'idle';
  drawPts = [];
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  if (firstPointMarker) { map.removeLayer(firstPointMarker); firstPointMarker = null; }
  map.getContainer().style.cursor = '';
  setToolLabel('Select draw tool');
  showHint('');
  document.getElementById('btn-draw').classList.remove('on');
}

let lastClickTime = 0;
const SNAP_PX = 18;

map.on('click', e => {
  if (mode === 'draw') {
    const now = Date.now();
    if (now - lastClickTime < 300) return; // ignore first click of dblclick
    lastClickTime = now;

    // Snap to first point to close polygon
    if (drawPts.length >= 3) {
      const firstPt = map.latLngToContainerPoint(L.latLng(drawPts[0][0], drawPts[0][1]));
      const clickPt = map.latLngToContainerPoint(e.latlng);
      if (Math.hypot(firstPt.x - clickPt.x, firstPt.y - clickPt.y) < SNAP_PX) {
        finishDraw();
        return;
      }
    }

    drawPts.push([e.latlng.lat, e.latlng.lng]);
    updateDrawPreview();
  } else if (mode === 'correct-add') {
    addManualTree(e.latlng.lat, e.latlng.lng);
  }
});

map.on('dblclick', e => {
  if (mode === 'draw') {
    L.DomEvent.stop(e);
    // Remove the last point added by the first click of the double-click
    if (drawPts.length > 1) drawPts.pop();
    finishDraw();
  }
});

map.on('mousemove', e => {
  if (mode !== 'draw' || drawPts.length < 3) return;
  const firstPt = map.latLngToContainerPoint(L.latLng(drawPts[0][0], drawPts[0][1]));
  const movePt  = map.latLngToContainerPoint(e.latlng);
  const near = Math.hypot(firstPt.x - movePt.x, firstPt.y - movePt.y) < SNAP_PX;
  if (firstPointMarker) {
    firstPointMarker.setRadius(near ? 10 : 6);
    firstPointMarker.setStyle({fillColor: near ? '#3fb950' : '#58a6ff',
                                color:     near ? '#3fb950' : '#58a6ff'});
  }
  if (near) showHint('Click to close polygon');
  else if (drawPts.length >= 3) showHint(`${drawPts.length} points · Click first point or double-click to finish`);
});
  if (e.key === 'Escape') {
    if (mode === 'draw') cancelDraw();
    if (mode.startsWith('correct')) endCorrect();
  }
  if (e.key === 'Enter' && mode === 'draw') finishDraw();
});

let firstPointMarker = null;

function updateDrawPreview() {
  if (drawPolyline) map.removeLayer(drawPolyline);
  if (firstPointMarker) map.removeLayer(firstPointMarker);
  if (drawPts.length === 0) return;

  // Show first point as a circle
  firstPointMarker = L.circleMarker(drawPts[0], {
    radius: 6, color: '#58a6ff', fillColor: '#58a6ff',
    fillOpacity: 1, weight: 2
  }).addTo(map);

  if (drawPts.length < 2) {
    showHint('Keep clicking to add points · Double-click to finish · Esc to cancel');
    return;
  }

  drawPolyline = L.polyline([...drawPts, drawPts[0]], {
    color: '#58a6ff', weight: 2, dashArray: '5,4', opacity: 0.85
  }).addTo(map);

  showHint(`${drawPts.length} points · Double-click or Enter to finish · Esc to cancel`);
}

function finishDraw() {
  if (drawPts.length < 3) { cancelDraw(); return; }
  if (firstPointMarker) { map.removeLayer(firstPointMarker); firstPointMarker = null; }
  const poly = L.polygon(drawPts, {
    color: '#58a6ff', weight: 2, fillColor: '#58a6ff',
    fillOpacity: 0.08, dashArray: '6,3'
  }).addTo(map);

  const label = `Area ${analysisAreas.length + 1}`;
  poly.bindTooltip(label, {permanent: true, className: 'patch-label', direction: 'center'});

  analysisAreas.push({polygon: [...drawPts], layer: poly, label});
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }

  cancelDraw();
  updateAnalyzeBtn();
}

function updateAnalyzeBtn() {
  const btn = document.getElementById('btn-analyze');
  btn.disabled = analysisAreas.length === 0;
}

// ── Import FarmTwin zones ─────────────────────────────────────────────
async function importZones() {
  const projId = document.getElementById('proj-id').value.trim() || 'mafraq-farm-1';
  setToolLabel('Importing zones from FarmTwin...');
  try {
    let initApp, getDb, refFn, onVal;
    const fbApp = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const fbDb  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
    initApp = fbApp.initializeApp; getDb = fbDb.getDatabase;
    refFn = fbDb.ref; onVal = fbDb.onValue;

    const app = initApp({
      apiKey:"AIzaSyAkqts691Hg1uXhLDRloKoAgNotCwYx6XY",
      databaseURL:"https://pipemap-45e15-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:"pipemap-45e15",
      appId:"1:172642929084:web:11605fc95947cbbb3403b9"
    }, 'tree-counter-' + Date.now());

    const db = getDb(app);
    const r = refFn(db, `projects/${projId}/ft`);

    onVal(r, snap => {
      const d = snap.val();
      if (!d?.zones) { setToolLabel('No zones found in project'); return; }

      const zones = Array.isArray(d.zones) ? d.zones : Object.values(d.zones);
      let imported = 0;
      zones.forEach(zone => {
        if (!zone.polygon || zone.polygon.length < 3) return;
        const pts = zone.polygon.map(p => [p[0], p[1]]);
        const poly = L.polygon(pts, {
          color: '#d29922', weight: 2, fillColor: '#d29922',
          fillOpacity: 0.08, dashArray: '6,3'
        }).addTo(map);
        const label = zone.label || `Zone ${imported+1}`;
        poly.bindTooltip(label + ' (FT)', {permanent: true, className: 'patch-label', direction: 'center'});
        analysisAreas.push({polygon: pts, layer: poly, label: label + ' (imported)'});
        imported++;
      });
      setToolLabel(`Imported ${imported} zone(s) from FarmTwin`);
      updateAnalyzeBtn();
      if (imported > 0 && zones.length > 0) {
        const first = zones.find(z => z.polygon?.length >= 3);
        if (first) map.fitBounds(L.polygon(first.polygon.map(p=>[p[0],p[1]])).getBounds());
      }
    }, {onlyOnce: true});

  } catch(e) {
    setToolLabel('Import failed: ' + e.message);
  }
}

// ── Analyze ───────────────────────────────────────────────────────────
async function analyzeAll() {
  if (analysisAreas.length === 0) return;

  if (!SERVER) {
    alert('Please enter your server URL in the field at the top left.');
    return;
  }
  try {
    await fetch(SERVER + '/ping', {signal: AbortSignal.timeout(35000)});
  } catch {
    alert('Cannot reach the server at:\n' + SERVER + '\n\nCheck the URL is correct and the server is running.');
    return;
  }

  // Show panel and progress
  const panel = document.getElementById('panel');
  panel.style.display = 'flex';
  const body = document.getElementById('panel-body');
  body.innerHTML = '<div style="color:var(--tx3);font-size:12px">Running analysis...</div>';
  showProgress(true);
  updateProgress(0, 'Starting...');

  // Clear previous results
  clearResults();
  allResults = {patches: [], total_alive: 0, total_missing: 0, total_expected: 0};

  // Analyze each area sequentially
  for (let i = 0; i < analysisAreas.length; i++) {
    const area = analysisAreas[i];
    updateProgress(Math.round(i/analysisAreas.length*100), `Analyzing ${area.label}...`);

    const reqId = 'r' + Date.now();

    // Poll progress using reqId
    progressTimer = setInterval(async () => {
      try {
        const pr = await fetch(SERVER + '/progress/' + reqId).then(r => r.json());
        updateProgress(pr.pct, pr.message);
      } catch {}
    }, 800);

    try {
      const res = await fetch(SERVER + '/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          polygon: area.polygon,
          label: area.label,
          reqId,
          projectId: document.getElementById('proj-id').value
        })
      });
      clearInterval(progressTimer);
      const data = await res.json();
      console.log('Raw server response:', JSON.stringify(data).slice(0, 500));
      if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);
      if (data.error) throw new Error(data.error);

      // Accumulate totals
      allResults.total_alive += data.total_alive;
      allResults.total_missing += data.total_missing;
      allResults.total_expected += data.total_expected;

      // Rename patches to include area label
      data.patches.forEach((p, j) => {
        p.area_label = area.label;
        p.global_id = `${i}_${j}`;
        allResults.patches.push(p);
      });

      // Draw markers
      drawResults(data, area);

    } catch(e) {
      clearInterval(progressTimer);
      updateProgress(0, 'Error: ' + e.message);
    }
  }

  // Sort patches by missing count
  allResults.patches.sort((a,b) => b.missing - a.missing);

  showProgress(false);
  renderResultsPanel();
  document.getElementById('btn-correct').style.display = 'inline-block';
  document.getElementById('btn-export').style.display = 'inline-block';
  setToolLabel('Analysis complete');
}

function showProgress(show) {
  document.getElementById('progress-wrap').style.display = show ? 'block' : 'none';
}
function updateProgress(pct, msg) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-msg').textContent = msg;
}

// ── Draw results on map ───────────────────────────────────────────────
function makeTreeIcon(type) {
  return L.divIcon({
    className: 'tree-' + type,
    iconSize: type === 'missing' ? [12,12] : [10,10],
    iconAnchor: type === 'missing' ? [6,6] : [5,5]
  });
}

function drawResults(data, area) {
  data.patches.forEach((patch, pi) => {
    // Draw alive trees
    patch.trees.forEach(t => {
      const m = L.marker([t.lat, t.lng], {icon: makeTreeIcon('alive')})
        .bindTooltip(`${area.label} · Alive`, {className:'patch-label'});
      m.on('click', () => {
        if (mode === 'correct-remove') removeTreeMarker(m, t, 'alive');
      });
      m.addTo(map);
      markerLayers.push({marker: m, data: t, type: 'alive', patchId: patch.global_id || pi});
    });

    // Draw missing tree positions
    patch.missing_trees.forEach(t => {
      const m = L.marker([t.lat, t.lng], {icon: makeTreeIcon('missing')})
        .bindTooltip(`${area.label} · Missing`, {className:'patch-label'});
      m.on('click', () => {
        if (mode === 'correct-remove') removeTreeMarker(m, t, 'missing');
      });
      m.addTo(map);
      markerLayers.push({marker: m, data: t, type: 'missing', patchId: patch.global_id || pi});
    });
  });
}

// ── Results panel rendering ───────────────────────────────────────────
function renderResultsPanel() {
  const body = document.getElementById('panel-body');
  if (!allResults) { body.innerHTML = ''; return; }

  const {patches, total_alive, total_missing, total_expected} = allResults;

  let h = '';

  // Grand total summary
  h += `<div class="summary-grid">
    <div class="stat-card alive"><div class="val">${total_alive.toLocaleString()}</div><div class="lbl">Alive</div></div>
    <div class="stat-card missing"><div class="val">${total_missing.toLocaleString()}</div><div class="lbl">Missing</div></div>
    <div class="stat-card total"><div class="val">${total_expected.toLocaleString()}</div><div class="lbl">Expected</div></div>
  </div>`;

  if (total_expected > 0) {
    const pct = ((total_alive/total_expected)*100).toFixed(0);
    h += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-bottom:3px">
        <span>Tree survival rate</span><span style="color:${pct>=90?'var(--ok)':pct>=70?'var(--warn)':'var(--err)'}">${pct}%</span>
      </div>
      <div style="height:5px;background:var(--sur3);border-radius:3px;overflow:hidden">
        <div style="height:5px;width:${pct}%;background:${pct>=90?'var(--ok)':pct>=70?'var(--warn)':'var(--err)'};border-radius:3px;transition:width .5s"></div>
      </div>
    </div>`;
  }

  // Patches table — sorted by missing (highest first)
  h += `<div class="sec-h">Patches — sorted by missing trees</div>`;
  h += `<table class="patch-table">
    <tr><th>Patch</th><th>Alive</th><th>Missing</th><th>Conf.</th></tr>`;

  patches.forEach((p, i) => {
    const confPct = Math.round((p.confidence||0)*100);
    const missClass = p.missing > 0 ? 'miss-badge' : 'ok-badge';
    h += `<tr onclick="focusPatch(${i})" title="Click to zoom to patch">
      <td>
        <div style="font-weight:600">${p.label}</div>
        ${p.area_label ? `<div style="font-size:9px;color:var(--tx3)">${p.area_label}</div>` : ''}
        ${p.scattered ? '<div style="font-size:9px;color:var(--warn)">⚠ irregular</div>' : ''}
        ${p.row_angle_deg!=null ? `<div style="font-size:9px;color:var(--tx3)">${p.row_angle_deg}° · ${p.row_spacing_m}m rows · ${p.tree_spacing_m}m trees</div>` : ''}
      </td>
      <td style="text-align:center;color:var(--ok);font-weight:700">${p.alive}</td>
      <td style="text-align:center"><span class="${missClass}">${p.missing}</span></td>
      <td><span class="conf-bar" style="width:${confPct}%"></span> <span style="font-size:9px;color:var(--tx3)">${confPct}%</span></td>
    </tr>`;
  });
  h += `</table>`;

  // Correction mode note
  h += `<div style="font-size:10px;color:var(--tx3);margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr)">
    Use <strong style="color:var(--tx2)">✎ Correct</strong> to manually add or remove trees.
    Yellow dots = manually added.
  </div>`;

  body.innerHTML = h;
}

function focusPatch(idx) {
  const patch = allResults?.patches[idx];
  if (!patch || (!patch.trees.length && !patch.missing_trees.length)) return;
  const all = [...patch.trees, ...patch.missing_trees];
  const bounds = L.latLngBounds(all.map(t => [t.lat, t.lng]));
  map.fitBounds(bounds.pad(0.2));
}

// ── Manual correction mode ────────────────────────────────────────────
function startCorrect() {
  mode = 'correct-add';
  map.getContainer().style.cursor = 'crosshair';
  document.getElementById('btn-correct').classList.add('on');
  document.getElementById('btn-correct').textContent = '✎ Adding trees';
  setToolLabel('Correction: click to ADD trees · Right-click to REMOVE · Esc to exit');
  showHint('Left-click = add alive tree  ·  Right-click marker = mark as missing  ·  Esc = exit correction');

  // Right-click on map = remove mode toggle
  map.on('contextmenu', onMapRightClick);
}

function onMapRightClick(e) {
  if (!mode.startsWith('correct')) return;
  // Find nearest marker within 15px
  let nearest = null, minDist = 20;
  markerLayers.concat(correctionMarkers).forEach(({marker}) => {
    const pt = map.latLngToContainerPoint(marker.getLatLng());
    const ept = map.latLngToContainerPoint(e.latlng);
    const d = Math.hypot(pt.x-ept.x, pt.y-ept.y);
    if (d < minDist) { minDist = d; nearest = marker; }
  });
  if (nearest) {
    map.removeLayer(nearest);
    markerLayers = markerLayers.filter(m => m.marker !== nearest);
    correctionMarkers = correctionMarkers.filter(m => m.marker !== nearest);
    recalcTotals();
  }
}

function addManualTree(lat, lng) {
  const m = L.marker([lat, lng], {icon: makeTreeIcon('manual')})
    .bindTooltip('Manual · Alive', {className:'patch-label'});
  m.addTo(map);
  correctionMarkers.push({marker: m, data: {lat, lng}, type: 'alive'});
  recalcTotals();
}

function removeTreeMarker(marker, data, type) {
  map.removeLayer(marker);
  markerLayers = markerLayers.filter(m => m.marker !== marker);
  recalcTotals();
}

function endCorrect() {
  mode = 'idle';
  map.off('contextmenu', onMapRightClick);
  map.getContainer().style.cursor = '';
  document.getElementById('btn-correct').classList.remove('on');
  document.getElementById('btn-correct').textContent = '✎ Correct';
  setToolLabel('Analysis complete');
  showHint('');
  recalcTotals();
}

function recalcTotals() {
  if (!allResults) return;
  // Recount from current markers
  const alive = markerLayers.filter(m => m.type === 'alive').length
              + correctionMarkers.filter(m => m.type === 'alive').length;
  const missing = markerLayers.filter(m => m.type === 'missing').length;
  allResults.total_alive = alive;
  allResults.total_missing = missing;
  allResults.total_expected = alive + missing;
  renderResultsPanel();
}

// ── Clear ─────────────────────────────────────────────────────────────
function clearResults() {
  markerLayers.forEach(m => map.removeLayer(m.marker));
  markerLayers = [];
  correctionMarkers.forEach(m => map.removeLayer(m.marker));
  correctionMarkers = [];
  resultLayers.forEach(l => map.removeLayer(l));
  resultLayers = [];
}

function clearAll() {
  clearResults();
  analysisAreas.forEach(a => map.removeLayer(a.layer));
  analysisAreas = [];
  allResults = null;
  document.getElementById('panel').style.display = 'none';
  document.getElementById('btn-correct').style.display = 'none';
  document.getElementById('btn-export').style.display = 'none';
  updateAnalyzeBtn();
  setToolLabel('Select draw tool');
  if (progressTimer) clearInterval(progressTimer);
}

// ── CSV Export ────────────────────────────────────────────────────────
function exportCSV() {
  if (!allResults) return;
  let csv = 'Patch,Area,Status,Latitude,Longitude,Row,Tree Spacing (m),Row Spacing (m),Confidence\r\n';
  allResults.patches.forEach(patch => {
    patch.trees.forEach(t => {
      csv += `"${patch.label}","${patch.area_label||''}","alive",${t.lat.toFixed(7)},${t.lng.toFixed(7)},${t.row||''},${patch.tree_spacing_m||''},${patch.row_spacing_m||''},${patch.confidence||''}\r\n`;
    });
    patch.missing_trees.forEach(t => {
      csv += `"${patch.label}","${patch.area_label||''}","missing",${t.lat.toFixed(7)},${t.lng.toFixed(7)},,${patch.tree_spacing_m||''},${patch.row_spacing_m||''},${patch.confidence||''}\r\n`;
    });
  });
  correctionMarkers.forEach(m => {
    const ll = m.marker.getLatLng();
    csv += `"Manual","","manual_alive",${ll.lat.toFixed(7)},${ll.lng.toFixed(7)},,,\r\n`;
  });
  // Summary at bottom
  csv += `\r\n"TOTAL","","alive",${allResults.total_alive},,,,,\r\n`;
  csv += `"TOTAL","","missing",${allResults.total_missing},,,,,\r\n`;
  csv += `"TOTAL","","expected",${allResults.total_expected},,,,,\r\n`;

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `tree-count-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); setTimeout(() => URL.revokeObjectURL(url), 1000);
}
</script>
