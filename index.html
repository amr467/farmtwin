        h+=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:10px;padding:4px 6px;border-radius:var(--rs);background:var(--sur2);margin-bottom:3px">
          <div><div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:${z.color||'#4ade80'}"></div><span style="color:var(--tx)">${z.label}</span></div>
          <div style="color:var(--tx3);margin-top:1px">${trees} trees × ${price} JD/tree</div></div>
          <div style="font-weight:700;color:${zoneCost>0?'var(--ok)':'var(--tx3)'}">${zoneCost>0?zoneCost.toLocaleString()+' JD':'—'}</div>
        </div>`;
      });
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:6px 8px;border-radius:var(--rs);background:var(--sur3);border:1px solid var(--bdr2);margin-top:4px">
        <span style="font-weight:600;color:var(--tx)">Total</span>
        <span style="font-weight:700;color:var(--ok);font-size:13px">${totalPrice.toLocaleString()} JD</span>
      </div></div>`;
    }
  }

  h+=`<div class="sb-sec"><div class="sb-sec-h">Zones (${zones.length})</div>`;
  zones.forEach(z=>{
    const area=(polyArea(z.polygon)/1000).toFixed(1);
    const isCrop=z.type!=='tank';
    const trees=isCrop&&z._treeCount?z._treeCount:0;
    const treeInfo=trees?` · ${trees} trees`:'';
    const latInfo=isCrop&&z._lateralM?` · ${z._lateralM>999?(z._lateralM/1000).toFixed(1)+'km':z._lateralM.toFixed(0)+'m'} lat`:'';
    const zoneCost=trees&&z.pricePerTree?trees*z.pricePerTree:0;

    h+=`<div class="sb-item${z.id===selZone?.id?' sel':''}" onclick="selectZone_sb('${z.id}')">

  // Nodes
  h+=`<div class="sb-sec"><div class="sb-sec-h">Nodes (${nodes.length})</div>`;

  body.innerHTML=h;

// ── GEOMETRY HELPERS ──────────────────────────────────────────────────
function pipeLenM(pipe){let t=0;for(let i=0;i<pipe.pts.length-1;i++)t+=hav(pipe.pts[i],pipe.pts[i+1]);return t;}
function polyArea(poly){
  if(poly.length<3)return 0;const R=6371000;let a=0;
  for(let i=0;i<poly.length;i++){const j=(i+1)%poly.length;
    const la1=poly[i][0]*Math.PI/180,la2=poly[j][0]*Math.PI/180;
    const lo1=poly[i][1]*Math.PI/180,lo2=poly[j][1]*Math.PI/180;
    a+=lo1*Math.sin(la2)-lo2*Math.sin(la1);}
  return Math.abs(a/2)*R*R;
}
function polygonPerim(poly){let t=0;for(let i=0;i<poly.length;i++)t+=hav(poly[i],poly[(i+1)%poly.length]);return t;}
function zoneCen(poly){return[poly.reduce((a,p)=>a+p[0],0)/poly.length,poly.reduce((a,p)=>a+p[1],0)/poly.length];}

// ── FIREBASE ──────────────────────────────────────────────────────────
function pushToFB(){
  setSS('syncing');ign=true;
  set(dbRef(),san({pipes:pipes.length?pipes:null,nodes:nodes.length?nodes:null,
    zones:zones.length?zones:null,sections:sections.length?sections:null}))
    .then(()=>{setSS('synced');document.getElementById('save-txt').textContent='Saved '+new Date().toLocaleTimeString();})
    .catch(err=>{setSS('offline');console.error(err);});
}
function subToProj(){
  if(fbUnsub){fbUnsub();fbUnsub=null;}setSS('syncing');
  try{
    fbUnsub=onValue(dbRef(),snap=>{
      if(ign){ign=false;return;}
      const d=snap.val();
      pipes=d?.pipes?(Array.isArray(d.pipes)?d.pipes:Object.values(d.pipes)):[];
      nodes=d?.nodes?(Array.isArray(d.nodes)?d.nodes:Object.values(d.nodes)):[];
      zones=d?.zones?(Array.isArray(d.zones)?d.zones:Object.values(d.zones)):[];
      sections=d?.sections?(Array.isArray(d.sections)?d.sections:Object.values(d.sections)):[];
      pc=pipes.length+1;nc=nodes.length+1;zc=zones.length+1;
      setSS('synced');document.getElementById('save-txt').textContent='Live — '+new Date().toLocaleTimeString();
      redraw();
    },err=>{
      console.error('Firebase onValue error:',err?.message||err);
      setSS('offline');
      document.getElementById('save-txt').textContent='DB error — working offline';
      // Still render the map even without Firebase
      redraw();
    });
  }catch(err){
    console.error('Firebase subscribe error:',err);
    setSS('offline');
    redraw();
  }
}

// ── ACCOUNTING ────────────────────────────────────────────────────────
let acctItems=[],acctNextId=1;

function acctAutoQty(item){
  const cz=zones.filter(z=>z.type!=='tank'&&z._treeCount!=null);
  switch(item.autoKey){
    case 'lat20mm': return cz.reduce((a,z)=>a+(z._lateralM||0),0);
    case 'sub1.5in': return cz.filter(z=>(z.subMainDia||'1.5')==='1.5').reduce((a,z)=>a+(z._subMainM||0),0);
    case 'sub2in':  return cz.filter(z=>z.subMainDia==='2').reduce((a,z)=>a+(z._subMainM||0),0);
    case 'feeders': return cz.reduce((a,z)=>a+(z._rowCount||0),0);
    case 'emitters':return cz.reduce((a,z)=>a+(z._emitterCount||0),0);
    default:
      if(item.autoKey?.startsWith('mainpipe-')){
        const dia=item.autoKey.replace('mainpipe-','');
        const stock=pipes.filter(p=>p.dia===dia&&p.status==='existing'&&!p.isReuse).reduce((a,p)=>a+pipeLenM(p),0);
        const needed=pipes.filter(p=>p.dia===dia&&p.status==='planned').reduce((a,p)=>a+pipeLenM(p),0);
        return Math.max(0,needed-stock);
      }
      return item.qty||0;
  }
}
function acctLineTotal(item){
  return acctAutoQty(item)*(item.unitPrice||0);
}

function toggleAcct(){
  const panel=document.getElementById('acct-panel');
  const isOpen=panel.classList.toggle('open');
  document.getElementById('acct-btn').classList.toggle('on',isOpen);

}

function renderAcct(){
  const body=document.getElementById('acct-body');
  if(!body)return;
  const fmtM=v=>v>999?`${(v/1000).toFixed(2)}km`:`${v.toFixed(0)}m`;
  const fmtJD=v=>v>0?`${v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} JD`:'—';

  if(!acctItems.length)initDefaultAcctItems();

  let h='';
  // Materials
  h+=`<div class="acct-sec"><div class="acct-sec-h">Materials &amp; Components</div>
  <table class="acct-table">
  <tr><th style="width:36%">Item</th><th>Unit</th><th class="acct-num">Qty</th><th class="acct-num">Unit price (JD)</th><th class="acct-num">Total (JD)</th><th></th></tr>`;
  acctItems.forEach((item,i)=>{
    const qty=acctAutoQty(item);
    const total=qty*(item.unitPrice||0);
    const qtyDisp=item.autoKey?(qty>999?fmtM(qty):qty.toFixed(1)):(qty||0);
    const autoTag=item.autoKey?`<span style="font-size:8px;color:var(--info);margin-left:3px">AUTO</span>`:'';
    h+=`<tr>
      <td>${item.label}${autoTag}</td>
      <td style="color:var(--tx3)">${item.unit||''}</td>
      <td class="acct-num">${item.autoKey
        ?`<span style="color:var(--tx2)">${qtyDisp}</span>`
        :`<input class="acct-inp" type="number" value="${qty}" min="0" onchange="setAcctQty(${i},this.value)">`}</td>
      <td class="acct-num"><input class="acct-inp" type="number" value="${item.unitPrice||0}" min="0" step="0.01" onchange="setAcctPrice(${i},this.value)"></td>
      <td class="acct-num" style="color:${total>0?'var(--ok)':'var(--tx3)'};font-weight:600">${total>0?fmtJD(total):'—'}</td>
      <td><button onclick="removeAcctItem(${i})" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:0 4px">×</button></td>
    </tr>`;
  });
  h+=`</table>
  <div class="acct-add" style="margin-top:8px">
    <input id="an-lbl" placeholder="Item name" style="flex:2">
    <input id="an-unit" placeholder="Unit" style="width:55px">
    <input id="an-qty" type="number" placeholder="Qty" style="width:55px" min="0">
    <input id="an-price" type="number" placeholder="JD/unit" style="width:70px" min="0" step="0.01">
    <button class="btn on" onclick="addManualAcctItem()">+ Add</button>
  </div></div>`;

  // Olive investment
  const cropZones=zones.filter(z=>z.type!=='tank');
  h+=`<div class="acct-sec"><div class="acct-sec-h">Olive Investment — per zone</div>
  <table class="acct-table">
  <tr><th>Zone</th><th class="acct-num">Trees</th><th class="acct-num">Price/tree (JD)</th><th class="acct-num">Total (JD)</th></tr>`;
  let oliveTotal=0;
  cropZones.forEach(z=>{
    const trees=z._treeCount||0,price=z.pricePerTree||0,cost=trees*price;
    oliveTotal+=cost;
    h+=`<tr>
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${z.color||'#4ade80'};margin-right:5px"></span>${z.label}</td>
      <td class="acct-num">${trees}</td>
      <td class="acct-num"><input class="acct-inp" type="number" value="${price}" min="0" step="0.5" onchange="setZonePrice('${z.id}',this.value)"></td>
      <td class="acct-num" style="color:${cost>0?'var(--ok)':'var(--tx3)'};font-weight:600">${cost>0?fmtJD(cost):'—'}</td>
    </tr>`;
  });
  if(!cropZones.length)h+=`<tr><td colspan="4" style="color:var(--tx3);padding:8px 6px;font-size:11px">No crop zones drawn yet</td></tr>`;
  h+=`</table></div>`;

  // Grand total
  const matTotal=acctItems.reduce((a,i)=>a+acctLineTotal(i),0);
  const grand=matTotal+oliveTotal;
  h+=`<div class="acct-total">
    <div>
      <div class="acct-total-lbl">Project total</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:2px">Materials ${fmtJD(matTotal)} + Olives ${fmtJD(oliveTotal)}</div>
    </div>
    <div class="acct-total-val">${fmtJD(grand)}</div>
  </div>`;

  body.innerHTML=h;
}
window.renderAcct=renderAcct;

function initDefaultAcctItems(){
  acctItems=[
    {id:acctNextId++,label:'20mm drip lateral',unit:'m',autoKey:'lat20mm',unitPrice:0},
    {id:acctNextId++,label:'1½″ sub-main pipe',unit:'m',autoKey:'sub1.5in',unitPrice:0},
    {id:acctNextId++,label:'2″ sub-main pipe',unit:'m',autoKey:'sub2in',unitPrice:0},
    {id:acctNextId++,label:'Lateral feeder tees',unit:'pcs',autoKey:'feeders',unitPrice:0},
    {id:acctNextId++,label:'Drip emitters',unit:'pcs',autoKey:'emitters',unitPrice:0},
  ];
  // Main pipes: qty = what to BUY (planned needed minus existing stock)
  ['5','4','3','2'].forEach(dia=>{
    const stock=pipes.filter(p=>p.dia===dia&&p.status==='existing'&&!p.isReuse).reduce((a,p)=>a+pipeLenM(p),0);
    const needed=pipes.filter(p=>p.dia===dia&&p.status==='planned').reduce((a,p)=>a+pipeLenM(p),0);
    if(needed>0||stock>0){
      acctItems.push({id:acctNextId++,label:`${dia}″ main pipe (buy)`,unit:'m',autoKey:`mainpipe-${dia}`,unitPrice:0});
    }
  });
  pushAcctToFB();
}

window.setAcctQty=function(i,v){if(acctItems[i])acctItems[i].qty=parseFloat(v)||0;renderAcct();pushAcctToFB();};
window.setAcctPrice=function(i,v){if(acctItems[i])acctItems[i].unitPrice=parseFloat(v)||0;renderAcct();pushAcctToFB();};

// ── CSV EXPORT ─────────────────────────────────────────────────────────
function csvCell(v){const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;}
function csvRow(...cells){return cells.map(csvCell).join(',')+'\r\n';}
function dlCSV(content,filename){
  const blob=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

  dlCSV(csv,`${proj}_accounting_${date}.csv`);

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='Escape'){if(drawPts.length>0)cancelDraw();else{if(tool!=='select')setTool('select');else clearSelection();}}
  if(e.key==='Enter'){if(drawPts.length>=2)finishDraw();}
  if(e.key==='p')setTool('pipe');if(e.key==='s')setTool('select');if(e.key==='z'&&!e.ctrlKey)setTool('zone');
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();}
  if(e.key==='Delete'||e.key==='Backspace'){if(selPipe||selNode||selZone)deleteSelected();}
});

setTool('select');setPSt('existing');setDia('3');
['ex','pl','zo','el','ln'].forEach(l=>document.getElementById('lyr-'+l)?.classList.add('on'));

});
