<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FarmTwin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#1c2129;--sur3:#21262d;
  --bdr:#30363d;--bdr2:#484f58;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --ok:#3fb950;--info:#58a6ff;--warn:#d29922;--err:#f85149;
  --well:#22d3ee;--tank:#fb923c;--pump:#a78bfa;--ep:#4ade80;
  --reuse:#a3e635;
  --r:8px;--rs:5px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh}

/* topbar */
#topbar{height:44px;background:var(--sur);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:600}
.logo{font-weight:700;font-size:15px;color:var(--ok);letter-spacing:-.3px}
.sep{width:1px;height:20px;background:var(--bdr);flex-shrink:0}
.tbi{height:26px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);
  color:var(--tx);padding:0 8px;font-size:11px;font-family:inherit}
.tbi:focus{outline:none;border-color:var(--ok)}
.btn{height:26px;padding:0 9px;background:var(--sur2);border:1px solid var(--bdr);
  border-radius:var(--rs);color:var(--tx2);font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
.btn:hover{background:var(--sur3);color:var(--tx)}
.btn.on{background:var(--ok);border-color:var(--ok);color:#0d1117;font-weight:600}
.btn.warn{border-color:var(--warn);color:var(--warn)}
.btn.err{border-color:var(--err);color:var(--err)}
#sync{height:20px;padding:0 7px;border-radius:10px;font-size:10px;font-weight:500;
  display:flex;align-items:center;gap:4px}
#sync.synced{background:#0d2c1a;border:1px solid #1a4731;color:var(--ok)}
#sync.syncing{background:#1c2030;border:1px solid #2d3a5a;color:var(--info)}
#sync.offline{background:#2c1418;border:1px solid #5a2d32;color:var(--err)}

/* map area */
#mw{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.ol{position:absolute;inset:0;overflow:visible;pointer-events:none}
#zone-svg{z-index:400}
#pipe-svg{z-index:410}
#ghost-svg{z-index:420}
#vtx-svg{z-index:430}
#node-layer{position:absolute;inset:0;z-index:450;pointer-events:none}
#snap-ring{position:absolute;border-radius:50%;border:2px solid var(--ok);
  transform:translate(-50%,-50%);pointer-events:none;display:none;z-index:440}
.hidden{display:none!important}

/* hud */
#hud{height:60px;background:var(--sur);border-top:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;z-index:600;overflow-x:auto}
.hgrp{display:flex;gap:3px;align-items:center;flex-shrink:0}
.hsep{width:1px;height:30px;background:var(--bdr);margin:0 3px}
.tool{width:44px;height:44px;padding:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;font-size:17px}
.tool .lbl{font-size:8px;font-weight:700;letter-spacing:.04em}
.pill{height:26px;padding:0 9px;border-radius:13px;border:1.5px solid var(--bdr2);
  background:var(--sur2);color:var(--tx);font-size:11px;cursor:pointer;font-family:inherit}
.pill.on{border-color:var(--info);background:#1c2d45;color:var(--info)}
.pill.ex.on{border-color:var(--ok);background:#0d2c1a;color:var(--ok)}
.pill.pl.on{border-color:var(--info);background:#1c2d45;color:var(--info)}
.pill.dmg.on{border-color:var(--err);background:#2c1418;color:var(--err)}

/* property card */
#pcard{position:absolute;z-index:850;background:var(--sur);border:1px solid var(--bdr2);
  border-radius:var(--r);padding:11px 13px;min-width:220px;max-width:270px;
  box-shadow:0 8px 24px #000a;pointer-events:all;display:none}
.pc-h{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  margin-bottom:8px}
.pc-r{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.pc-r label{font-size:11px;color:var(--tx2);width:90px;flex-shrink:0}
.pc-r input,.pc-r select{flex:1;height:24px;background:var(--sur2);border:1px solid var(--bdr2);
  border-radius:var(--rs);color:var(--tx);font-size:11px;padding:0 6px;font-family:inherit}
.pc-r input:focus,.pc-r select:focus{outline:none;border-color:var(--ok)}
.pc-hint{font-size:10px;color:var(--tx3);margin:3px 0 5px;line-height:1.5}
.pc-btns{display:flex;gap:5px;margin-top:7px}
.pcb{flex:1;height:24px;border-radius:var(--rs);border:1px solid var(--bdr2);
  background:var(--sur2);color:var(--tx2);font-size:11px;cursor:pointer;font-family:inherit}
.pcb:hover{background:var(--sur3);color:var(--tx)}
.pcb.ok{border-color:var(--ok);background:#0d2c1a;color:var(--ok)}
.pcb.del{border-color:var(--err);background:#2c1418;color:var(--err)}
.pcb.act{border-color:var(--reuse);background:#1a2800;color:var(--reuse)}
.pc-sect{border-top:1px solid var(--bdr);margin-top:7px;padding-top:7px}

/* context menu */
#ctx{position:fixed;z-index:2000;display:none}
.ctx-ring{position:relative;width:170px;height:170px}
.ctx-item{position:absolute;width:50px;height:50px;border-radius:50%;border:2px solid;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  cursor:pointer;transform:translate(-50%,-50%);transition:transform .1s;backdrop-filter:blur(6px)}
.ctx-item:hover{transform:translate(-50%,-50%) scale(1.18)}
.ci-lbl{font-size:9px;font-weight:700}
.ci-well{background:#072028;border-color:var(--well);color:var(--well)}
.ci-tank{background:#201008;border-color:var(--tank);color:var(--tank)}
.ci-pump{background:#140e24;border-color:var(--pump);color:var(--pump)}
.ci-ep{background:#071408;border-color:var(--ep);color:var(--ep)}
#ctx-bd{position:fixed;inset:0;z-index:1999}

/* sidebar */
#sb{position:absolute;right:0;top:0;bottom:0;width:270px;z-index:700;
  background:var(--sur);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .2s}
#sb.open{transform:none}
.sb-hd{display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-bottom:1px solid var(--bdr)}
.sb-bd{flex:1;overflow-y:auto;padding:8px 10px}
.sb-sec{margin-bottom:12px}
.sb-sec-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--tx3);margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:var(--rs);
  border:1px solid var(--bdr);background:var(--sur2);margin-bottom:3px;cursor:pointer;font-size:11px}
.sb-item:hover{border-color:var(--bdr2)}
.sb-item.sel{border-color:var(--ok);background:#0d2c1a}
.sb-sw{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sb-nm{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-mt{font-size:10px;color:var(--tx3);flex-shrink:0}

/* legend */
#legend{position:absolute;bottom:70px;left:10px;z-index:600;background:var(--sur);
  border:1px solid var(--bdr);border-radius:var(--r);padding:8px 10px;font-size:10px;pointer-events:none}
.lg-r{display:flex;align-items:center;gap:5px;margin-bottom:3px;color:var(--tx2)}

/* pipe length labels */
.plen{position:absolute;background:#0009;color:var(--tx2);font-size:9px;pointer-events:none;
  padding:1px 4px;border-radius:2px;white-space:nowrap;z-index:460;transform:translateX(-50%)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button,input,select{font-family:inherit}
/* ── Accounting panel ─────────────────────────────── */
#acct-panel{position:fixed;inset:0;z-index:900;background:#0009;display:none;align-items:flex-start;justify-content:center;padding-top:56px}
#acct-panel.open{display:flex}
#acct-inner{background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r);
  width:min(720px,96vw);max-height:82vh;display:flex;flex-direction:column;
  box-shadow:0 12px 40px #000c}
.acct-head{display:flex;align-items:center;justify-content:space-between;
  padding:11px 15px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.acct-title{font-weight:700;font-size:14px}
.acct-body{flex:1;overflow-y:auto;padding:12px 15px}
.acct-sec{margin-bottom:16px}
.acct-sec-h{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--tx3);margin-bottom:7px}
.acct-table{width:100%;border-collapse:collapse;font-size:11px}
.acct-table th{text-align:left;padding:3px 6px;color:var(--tx3);font-size:9px;
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr)}
.acct-table td{padding:5px 6px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.acct-table tr:last-child td{border-bottom:none}
.acct-num{text-align:right;font-variant-numeric:tabular-nums}
.acct-inp{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);
  color:var(--tx);padding:2px 6px;width:80px;height:22px;font-size:11px;font-family:inherit}
.acct-inp:focus{outline:none;border-color:var(--ok)}
.acct-total{display:flex;justify-content:space-between;align-items:center;
  padding:10px 13px;background:var(--sur3);border-radius:var(--rs);
  border:1px solid var(--bdr2);margin-top:10px}
.acct-total-lbl{font-weight:600;font-size:13px}
.acct-total-val{font-weight:700;font-size:17px;color:var(--ok)}
.acct-add{display:flex;gap:5px;margin-top:8px}
.acct-add input{height:26px;background:var(--sur2);border:1px solid var(--bdr2);
  border-radius:var(--rs);color:var(--tx);padding:0 7px;font-size:11px;font-family:inherit}
.acct-add input:focus{outline:none;border-color:var(--ok)}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <span class="logo">🌿 FarmTwin</span>
  <div class="sep"></div>
  <input class="tbi" id="proj-id" value="mafraq-farm-1" style="width:130px">
  <button class="btn" onclick="switchProject()">Load</button>
  <div class="sep"></div>
  <button class="btn" onclick="undo()">↩</button>
  <button class="btn" onclick="redo()">↪</button>
  <div class="sep"></div>
  <button class="btn" onclick="toggleSidebar()">≡ Lists</button>
  <button class="btn" onclick="toggleAcct()" id="acct-btn">💰 Accounting</button>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span id="save-txt" style="font-size:10px;color:var(--tx3)"></span>
    <div id="sync" class="offline"><span style="width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block"></span><span id="sync-txt">offline</span></div>
  </div>
</div>

<div id="mw">
  <div id="map"></div>
  <svg id="zone-svg" class="ol" xmlns="http://www.w3.org/2000/svg"></svg>
  <svg id="pipe-svg" class="ol" xmlns="http://www.w3.org/2000/svg"></svg>
  <svg id="ghost-svg" class="ol" xmlns="http://www.w3.org/2000/svg"></svg>
  <svg id="vtx-svg" class="ol" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="node-layer"></div>
  <div id="snap-ring"></div>
  <div id="pcard"></div>
  <div class="hidden" id="ctx-bd" onclick="closeCtx()"></div>
  <div id="ctx"></div>
  <div id="sb">
    <div class="sb-hd"><span style="font-weight:600">Items</span><button class="btn" onclick="toggleSidebar()">✕</button></div>
    <div class="sb-bd" id="sb-bd"></div>
  </div>
  <div id="legend">
    <div style="font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Status · Width=diameter</div>
    <div class="lg-r"><svg width="26" height="7"><line x1="0" y1="3.5" x2="26" y2="3.5" stroke="#3fb950" stroke-width="4" stroke-linecap="round"/></svg>Existing</div>
    <div class="lg-r"><svg width="26" height="7"><line x1="0" y1="3.5" x2="26" y2="3.5" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,4"/></svg>Planned new</div>
    <div class="lg-r"><svg width="26" height="7"><line x1="0" y1="3.5" x2="26" y2="3.5" stroke="#a3e635" stroke-width="3" stroke-linecap="round" stroke-dasharray="5,3"/></svg>Reuse existing</div>
    <div class="lg-r"><svg width="26" height="7"><line x1="0" y1="3.5" x2="26" y2="3.5" stroke="#f85149" stroke-width="3" stroke-linecap="round" stroke-dasharray="4,3"/></svg>Damaged</div>
  </div>
</div>

<div id="hud">
  <div class="hgrp">
    <button class="btn tool on" id="t-select" onclick="setTool('select')">↖<span class="lbl">SELECT</span></button>
    <button class="btn tool" id="t-pipe" onclick="setTool('pipe')">⌇<span class="lbl">PIPE</span></button>
    <button class="btn tool" id="t-zone" onclick="setTool('zone')">⬡<span class="lbl">ZONE</span></button>
  </div>
  <div class="hsep"></div>
  <div class="hgrp" id="pipe-opts" style="display:none">
    <button class="pill ex on" id="ps-existing" onclick="setPSt('existing')">Existing</button>
    <button class="pill pl" id="ps-planned" onclick="setPSt('planned')">New</button>
    <button class="pill dmg" id="ps-damaged" onclick="setPSt('damaged')">Damaged</button>
  </div>
  <div class="hsep" id="pipe-sep" style="display:none"></div>
  <div class="hgrp" id="dia-opts" style="display:none">
    <button class="pill" id="d-5" onclick="setDia('5')">5″</button>
    <button class="pill on" id="d-3" onclick="setDia('3')">3″</button>
    <button class="pill" id="d-4" onclick="setDia('4')">4″</button>
    <button class="pill" id="d-2" onclick="setDia('2')">2″</button>
    <button class="pill" id="d-20mm" onclick="setDia('20mm')">20mm</button>
  </div>
  <div class="hsep"></div>
  <div class="hgrp">
    <button class="pill on" id="lyr-ex" onclick="toggleLyr('ex')">Existing</button>
    <button class="pill on" id="lyr-pl" onclick="toggleLyr('pl')">Planned</button>
    <button class="pill on" id="lyr-zo" onclick="toggleLyr('zo')">Zones</button>
    <button class="pill on" id="lyr-el" onclick="toggleLyr('el')">Elev</button>
    <button class="pill on" id="lyr-ln" onclick="toggleLyr('ln')">Lengths</button>
  </div>
  <div class="hsep"></div>
  <div class="hgrp" id="draw-act" style="display:none">
    <button class="btn on" onclick="finishDraw()">✓ Done</button>
    <button class="btn" onclick="cancelDraw()">✕ Cancel</button>
  </div>
  <div class="hgrp">
    <button class="btn" id="del-btn" onclick="deleteSelected()">🗑 Delete</button>
  </div>
</div>

</div>

<!-- Accounting panel -->
<div id="acct-panel">
  <div id="acct-inner">
    <div class="acct-head">
      <span class="acct-title">💰 Accounting</span>
      <div style="display:flex;gap:6px">
        <button class="btn" onclick="exportAcctCSV()" title="Export full GAAP-compatible CSV">⬇ Export CSV</button>
        <button class="btn" onclick="exportSummaryCSV()" title="Export one-page summary">⬇ Summary</button>
        <button class="btn" onclick="toggleAcct()">✕ Close</button>
      </div>
    </div>
    <div class="acct-body" id="acct-body"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getDatabase,ref,onValue,set}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const fb=initializeApp({
  apiKey:"AIzaSyAkqts691Hg1uXhLDRloKoAgNotCwYx6XY",
  authDomain:"pipemap-45e15.firebaseapp.com",
  databaseURL:"https://pipemap-45e15-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"pipemap-45e15",storageBucket:"pipemap-45e15.firebasestorage.app",
  messagingSenderId:"172642929084",appId:"1:172642929084:web:11605fc95947cbbb3403b9"
});
const db=getDatabase(fb);
let projId='mafraq-farm-1',fbUnsub=null,ign=false;
const dbRef=()=>ref(db,'projects/'+projId+'/ft');

function setSS(s){
  const p=document.getElementById('sync'),t=document.getElementById('sync-txt');
  p.className=s;t.textContent=s==='synced'?'saved':s==='syncing'?'saving…':'offline';
}
function san(v){
  if(v===undefined||v===null)return null;
  if(Array.isArray(v))return v.map(san);
  if(typeof v==='object'){const o={};for(const k in v)o[k]=san(v[k]);return o;}
  return v;
}

// ── DATA ──────────────────────────────────────────────────────────────
// pipes: {id,pts,dia,status:'existing'|'planned'|'damaged',isReuse:bool,label,valveState,pumpNodeId}
// nodes: {id,type:'well'|'tank'|'pump'|'endpoint',lat,lng,label,elev,
//         well: depth,drawdownFactor,pumpHead,pumpFlowM3h
//         tank: waterLevel,maxDepth,maxFlowM3h
//         pump: pumpHead,pumpFlowM3h,on:bool  (point-node pump on pipe)
//         endpoint: sectionId}
// zones: {id,label,polygon,rowSpacingM,treeSpacingM,emitters,lhrPerEmitter,
//         color,type:'zone'|'tank',
//         tank: wallType:'vertical'|'sloped', waterLevel,maxDepth,maxFlowM3h,soilAngle}
let pipes=[],nodes=[],zones=[],sections=[];
let nc=1,pc=1,zc=1;

// ── HISTORY ───────────────────────────────────────────────────────────
let hist=[],redo_=[];
const snap_=()=>JSON.parse(JSON.stringify({pipes,nodes,zones,sections}));
function pushH(){hist.push(snap_());if(hist.length>60)hist.shift();redo_=[];}
window.undo=()=>{if(!hist.length)return;redo_.push(snap_());const s=hist.pop();pipes=s.pipes;nodes=s.nodes;zones=s.zones;sections=s.sections;pushToFB();redraw();};
window.redo=()=>{if(!redo_.length)return;hist.push(snap_());const s=redo_.pop();pipes=s.pipes;nodes=s.nodes;zones=s.zones;sections=s.sections;pushToFB();redraw();};

// ── CONSTANTS ─────────────────────────────────────────────────────────
const PW={'5':10,'4':7,'3':5,'2':3.5,'20mm':2};
const PM={'5':0.127,'4':0.102,'3':0.076,'2':0.051,'20mm':0.020};
const SNAP_PX=20;        // pixel snap threshold for existing-layer to existing-layer
const ANG_SNAP=8;        // degrees angle magnetism
const PAR_DIST=50;       // metres for parallel detection
const ZONE_COLS=['#4ade80','#60a5fa','#fb923c','#f472b6','#a78bfa','#34d399','#fbbf24'];
const SCOL={existing:'#3fb950',planned:'#58a6ff',damaged:'#f85149'};
const SDASH={existing:null,planned:'9,5',damaged:'4,3'};
const NCOL={well:'#22d3ee',tank:'#fb923c',pump:'#a78bfa',endpoint:'#4ade80'};
const NSZ={well:32,tank:28,pump:24,endpoint:22};

// ── MAP ───────────────────────────────────────────────────────────────
const map=L.map('map',{center:[32.495,36.168],zoom:16,zoomControl:false,attributionControl:false,preferCanvas:false});
L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:21}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);
const pSvg=document.getElementById('pipe-svg'),gSvg=document.getElementById('ghost-svg');
const zSvg=document.getElementById('zone-svg'),vSvg=document.getElementById('vtx-svg');

function ll2p(lat,lng){const p=map.latLngToContainerPoint([lat,lng]);return{x:p.x,y:p.y};}
function p2ll(x,y){const l=map.containerPointToLatLng([x,y]);return[l.lat,l.lng];}
function hav(a,b){
  const R=6371000,d1=(b[0]-a[0])*Math.PI/180,d2=(b[1]-a[1])*Math.PI/180;
  const s=Math.sin(d1/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(d2/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function angDeg(a,b){return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;}
function angDiff(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}

function resizeSvgs(){
  const w=map.getContainer().offsetWidth,h=map.getContainer().offsetHeight;
  [pSvg,gSvg,zSvg,vSvg].forEach(s=>{s.setAttribute('width',w);s.setAttribute('height',h);s.setAttribute('viewBox',`0 0 ${w} ${h}`);});
}
window.addEventListener('resize',()=>{map.invalidateSize();resizeSvgs();redraw();});
map.on('resize',resizeSvgs);
map.on('moveend zoomend',()=>{redraw();updateGhost();});
setTimeout(resizeSvgs,50);

// ── TOOL STATE ────────────────────────────────────────────────────────
let tool='select',pipeSt='existing',dia='3';
let drawPts=[],ghostPt=null,angSnap=null;
let selPipe=null,selNode=null,selZone=null; // actual objects
let pendingZoneType='zone';
let lyr={ex:true,pl:true,zo:true,el:true,ln:true};
let activeDrag=null,lastClickT=0;

// ── LAYER HELPERS ─────────────────────────────────────────────────────
// Damaged pipes are existing infrastructure (in the ground, just need replacing).
// They snap to and interact with the existing layer, not the planned layer.
function pipeLayer(p){return(p.status==='existing'||p.status==='damaged')?'ex':'pl';}
// Current drawing layer
function drawLayer(){return(pipeSt==='existing'||pipeSt==='damaged')?'ex':'pl';}
// Pipe color including reuse variant
function pipeCol(p){
  if(p.isReuse)return'#a3e635';
  return SCOL[p.status]||'#888';
}
function pipeDash(p){
  if(p.isReuse)return'5,3';
  return SDASH[p.status]||null;
}
function pipeW(p){return PW[p.dia]||3;}

// ── SNAPPING ──────────────────────────────────────────────────────────
// KEY RULE: existing-layer pipes only snap to other existing-layer things.
//           planned-layer pipes only snap to other planned-layer things.
//           Nodes snap to any pipe of any layer.

function pixDist(a,b){return Math.hypot(b.x-a.x,b.y-a.y);}

function findSnap(lat,lng,exPipeId){
  const curLayer=drawLayer();
  const curPx=ll2p(lat,lng);
  let best=null,bestD=Infinity;

  // Nodes (any layer can snap to named nodes)
  nodes.forEach(nd=>{
    const npx=ll2p(nd.lat,nd.lng);
    const d=pixDist(curPx,npx);
    if(d<SNAP_PX&&d<bestD){bestD=d;best={type:'node',pt:[nd.lat,nd.lng],nodeId:nd.id};}
  });

  // Pipes — only same-layer
  pipes.forEach(pipe=>{
    if(pipe.id===exPipeId)return;
    if(pipeLayer(pipe)!==curLayer)return; // layer isolation
    const pts=pipe.pts;
    // endpoints
    [[0,'start'],[pts.length-1,'end']].forEach(([i,end])=>{
      const ppx=ll2p(pts[i][0],pts[i][1]);
      const d=pixDist(curPx,ppx);
      if(d<SNAP_PX&&d<bestD){bestD=d;best={type:'endpoint',pt:pts[i],pipeId:pipe.id,end};}
    });
    // midspan
    for(let i=0;i<pts.length-1;i++){
      const cp=closestOnSeg([lat,lng],pts[i],pts[i+1]);
      const cpPx=ll2p(cp.pt[0],cp.pt[1]);
      const d=pixDist(curPx,cpPx);
      if(d<SNAP_PX*0.7&&d<bestD){ // tighter for midspan
        const dS=pixDist(cpPx,ll2p(pts[i][0],pts[i][1]));
        const dE=pixDist(cpPx,ll2p(pts[i+1][0],pts[i+1][1]));
        if(dS>8&&dE>8){bestD=d;best={type:'midspan',pt:cp.pt,pipeId:pipe.id,segIdx:i};}
      }
    }
  });
  return best;
}

function closestOnSeg(p,a,b){
  const mLat=111320,mLng=111320*Math.cos(a[0]*Math.PI/180);
  const bx=(b[1]-a[1])*mLng,by=(b[0]-a[0])*mLat;
  const px=(p[1]-a[1])*mLng,py=(p[0]-a[0])*mLat;
  const lsq=bx*bx+by*by;if(!lsq)return{pt:a,t:0,d:hav(p,a)};
  let t=((px*bx+py*by)/lsq);t=Math.max(0,Math.min(1,t));
  const rp=[a[0]+t*(b[0]-a[0]),a[1]+t*(b[1]-a[1])];
  return{pt:rp,t,d:hav(p,rp)};
}

function computeAngSnap(fromLat,fromLng,toLat,toLng){
  const p1=ll2p(fromLat,fromLng),p2=ll2p(toLat,toLng);
  const raw=angDeg(p1,p2);
  const mags=[0,45,90,135,180,-135,-90,-45];
  // Only parallel-snap to same-layer pipes
  pipes.filter(p=>pipeLayer(p)===drawLayer()).forEach(pipe=>{
    for(let i=0;i<pipe.pts.length-1;i++){
      const a=pipe.pts[i],b=pipe.pts[i+1];
      const mid=[(a[0]+b[0])/2,(a[1]+b[1])/2];
      if(hav([fromLat,fromLng],mid)>PAR_DIST)continue;
      const ang=angDeg(ll2p(a[0],a[1]),ll2p(b[0],b[1]));
      mags.push(ang,ang+180,ang-180);
    }
  });
  for(const m of mags){if(angDiff(raw,m)<=ANG_SNAP)return m;}
  return null;
}

function applyAngSnap(fromLat,fromLng,toLat,toLng,ang){
  if(ang===null)return[toLat,toLng];
  const p1=ll2p(fromLat,fromLng),p2=ll2p(toLat,toLng);
  const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy);
  const rad=ang*Math.PI/180;
  return p2ll(p1.x+len*Math.cos(rad),p1.y+len*Math.sin(rad));
}

// ── TOPOLOGY ─────────────────────────────────────────────────────────
function buildTopo(){
  const eps=[];
  pipes.forEach(p=>{if(p.pts.length<2)return;eps.push({pt:p.pts[0]});eps.push({pt:p.pts[p.pts.length-1]});});
  const seen=new Set(),juncs=[];
  eps.forEach((ep,i)=>{
    if(seen.has(i))return;
    const cl=[ep];seen.add(i);
    eps.forEach((ep2,j)=>{
      if(i===j||seen.has(j))return;
      if(pixDist(ll2p(ep.pt[0],ep.pt[1]),ll2p(ep2.pt[0],ep2.pt[1]))<SNAP_PX){cl.push(ep2);seen.add(j);}
    });
    if(cl.length>1){
      const lat=cl.reduce((a,c)=>a+c.pt[0],0)/cl.length;
      const lng=cl.reduce((a,c)=>a+c.pt[1],0)/cl.length;
      juncs.push({lat,lng,n:cl.length});
    }
  });
  return juncs;
}

function splitPipe(pipe,segIdx,splitPt){
  const ptsA=[...pipe.pts.slice(0,segIdx+1),splitPt];
  const ptsB=[splitPt,...pipe.pts.slice(segIdx+1)];
  pipe.pts=ptsA;
  const pb={id:'p'+Date.now()+'_'+Math.random().toString(36).slice(2,5)+'b',
    label:'Pipe '+pc++,pts:ptsB,dia:pipe.dia??'3',
    status:pipe.status??'existing',isReuse:pipe.isReuse||false,valveState:pipe.valveState||'open'};
  pipes.push(pb);
  return splitPt;
}

// ── PIPE RENDERING ───────────────────────────────────────────────────
function mkPath(pts,stroke,sw,dash,op){
  if(pts.length<2)return null;
  const d='M'+pts.map(p=>p.x+','+p.y).join('L');
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);path.setAttribute('stroke',stroke);
  path.setAttribute('stroke-width',sw);path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap','round');path.setAttribute('stroke-linejoin','round');
  if(dash)path.setAttribute('stroke-dasharray',dash);
  if(op!=null)path.setAttribute('opacity',op);
  return path;
}
function mkCirc(cx,cy,r,fill,stroke,sw){
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
  c.setAttribute('fill',fill);c.setAttribute('stroke',stroke);c.setAttribute('stroke-width',sw);
  return c;
}

function drawArrows(svg,pts,col,w){
  let total=0;
  for(let i=0;i<pts.length-1;i++)total+=Math.hypot(pts[i+1].x-pts[i].x,pts[i+1].y-pts[i].y);
  if(total<25)return;
  const cnt=Math.max(1,Math.floor(total/130));
  for(let k=1;k<=cnt;k++){
    let acc=0,td=total*k/(cnt+1);
    for(let i=0;i<pts.length-1;i++){
      const sl=Math.hypot(pts[i+1].x-pts[i].x,pts[i+1].y-pts[i].y);
      if(acc+sl>=td){
        const t_=(td-acc)/sl;
        const cx=pts[i].x+(pts[i+1].x-pts[i].x)*t_,cy=pts[i].y+(pts[i+1].y-pts[i].y)*t_;
        const ux=(pts[i+1].x-pts[i].x)/sl,uy=(pts[i+1].y-pts[i].y)/sl;
        const sz=Math.max(6,w*2);
        const tip={x:cx+ux*sz,y:cy+uy*sz},bl={x:cx-ux*sz*.6-uy*sz*.7,y:cy-uy*sz*.6+ux*sz*.7},br={x:cx-ux*sz*.6+uy*sz*.7,y:cy-uy*sz*.6-ux*sz*.7};
        const ps=`${tip.x},${tip.y} ${bl.x},${bl.y} ${br.x},${br.y}`;
        const o=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        o.setAttribute('points',ps);o.setAttribute('fill','#000a');o.setAttribute('stroke-width','0');
        svg.appendChild(o);
        const pg=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        pg.setAttribute('points',ps);pg.setAttribute('fill',col);pg.setAttribute('opacity','0.9');
        svg.appendChild(pg);break;
      }
      acc+=sl;
    }
  }
}

function drawPipes(){
  pSvg.innerHTML='';
  document.querySelectorAll('.plen').forEach(e=>e.remove());
  const juncs=buildTopo();
  const isSel=p=>p.id===selPipe?.id;

  pipes.forEach(pipe=>{
    if(pipe.pts.length<2)return;
    const isEx=pipe.status==='existing'||pipe.status==='damaged';
    if(!lyr.ex&&isEx)return;
    if(!lyr.pl&&!isEx)return;
    const pxpts=pipe.pts.map(p=>ll2p(p[0],p[1]));
    const col=pipeCol(pipe),dash=pipeDash(pipe),w=pipeW(pipe);
    const op=selPipe&&!isSel(pipe)?0.28:1;
    if(isSel(pipe)){const g=mkPath(pxpts,col,w+12,null,0.15);if(g)pSvg.appendChild(g);}
    const body=mkPath(pxpts,col,w,dash,op);if(body)pSvg.appendChild(body);
    // hit area
    const hit=mkPath(pxpts,'transparent',Math.max(w+16,22),null,0);
    if(hit){
      hit.style.pointerEvents='stroke';
      hit.addEventListener('mouseover',()=>{hit.style.cursor=tool==='pipe'?'crosshair':'pointer';});
      hit.addEventListener('click',e=>{
        e.stopPropagation();
        if(tool==='select'){selectPipe(pipe);return;}
        if(tool==='pipe'){
          // Branch from pipe — click-point split, then start drawing
          const rect=map.getContainer().getBoundingClientRect();
          const cpx={x:e.clientX-rect.left,y:e.clientY-rect.top};
          startBranchFromPipe(pipe,cpx);
        }
      });
      pSvg.appendChild(hit);
    }
    if(op>0.4)drawArrows(pSvg,pxpts,col,w);
    // ── selected pipe: draggable point handles ──
    if(isSel(pipe)){
      pipe.pts.forEach((pt,pi)=>{
        const isEP=pi===0||pi===pipe.pts.length-1;
        const px=ll2p(pt[0],pt[1]);
        const h=mkCirc(px.x,px.y,isEP?8:5,'var(--sur)',isEP?col:'var(--bdr2)','2');
        h.style.cursor='grab';h.style.pointerEvents='all';
        h.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();pushH();startDrag('ppt',{pipe,ptIdx:pi,lat:pt[0],lng:pt[1]},e);});
        // Right-click waypoint to delete it
        if(!isEP){
          h.addEventListener('contextmenu',e=>{
            e.preventDefault();e.stopPropagation();
            pushH();pipe.pts.splice(pi,1);pushToFB();drawPipes();
          });
        }
        pSvg.appendChild(h);
      });
      // midpoint add-vertex ghosts
      for(let i=0;i<pipe.pts.length-1;i++){
        const a=ll2p(pipe.pts[i][0],pipe.pts[i][1]),b=ll2p(pipe.pts[i+1][0],pipe.pts[i+1][1]);
        const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
        const mh=mkCirc(mx,my,4,'var(--sur3)','var(--bdr2)','1.5');
        mh.setAttribute('opacity','0.8');mh.style.cursor='crosshair';mh.style.pointerEvents='all';
        const si=i;
        mh.addEventListener('mousedown',e=>{
          e.preventDefault();e.stopPropagation();pushH();
          const nl=p2ll(mx,my);pipe.pts.splice(si+1,0,nl);
          startDrag('ppt',{pipe,ptIdx:si+1,lat:nl[0],lng:nl[1]},e);
        });
        pSvg.appendChild(mh);
      }
    }
  });

  // inferred junctions
  juncs.forEach(j=>{
    const px=ll2p(j.lat,j.lng);
    const c=mkCirc(px.x,px.y,j.n>2?6:4,'var(--sur)','var(--bdr2)','1.5');
    pSvg.appendChild(c);
  });

  // length labels
  if(lyr.ln){
    pipes.forEach(pipe=>{
      if(pipe.pts.length<2)return;
      const l=pipeLenM(pipe);if(l<5)return;
      const mi=Math.floor(pipe.pts.length/2);
      const px=ll2p(pipe.pts[mi][0],pipe.pts[mi][1]);
      const el=document.createElement('div');
      el.className='plen';el.style.left=px.x+'px';el.style.top=(px.y-12)+'px';
      el.textContent=l>999?`${(l/1000).toFixed(2)}km`:`${l.toFixed(0)}m`;
      document.getElementById('mw').appendChild(el);
    });
  }
}

function startBranchFromPipe(pipe,cpx){
  // Find closest point on pipe in pixel space
  let bestPt=null,bestD=Infinity,bestSeg=-1;
  for(let i=0;i<pipe.pts.length-1;i++){
    const a=ll2p(pipe.pts[i][0],pipe.pts[i][1]),b=ll2p(pipe.pts[i+1][0],pipe.pts[i+1][1]);
    const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
    let t=l2?((cpx.x-a.x)*dx+(cpx.y-a.y)*dy)/l2:0;
    t=Math.max(0,Math.min(1,t));
    const cx=a.x+t*dx,cy=a.y+t*dy;
    const d=Math.hypot(cx-cpx.x,cy-cpx.y);
    if(d<bestD){bestD=d;bestSeg=i;bestPt=p2ll(cx,cy);}
  }
  if(!bestPt||bestSeg<0)return;
  // Snap to endpoint if close
  const dStart=pixDist(cpx,ll2p(pipe.pts[0][0],pipe.pts[0][1]));
  const dEnd=pixDist(cpx,ll2p(pipe.pts[pipe.pts.length-1][0],pipe.pts[pipe.pts.length-1][1]));
  let branchPt;
  if(dStart<22){branchPt=pipe.pts[0];}
  else if(dEnd<22){branchPt=pipe.pts[pipe.pts.length-1];}
  else{pushH();branchPt=splitPipe(pipe,bestSeg,bestPt);}
  drawPts=[branchPt];ghostPt=branchPt;updateGhost();
}

        h.addEventListener('dblclick',e=>{e.preventDefault();e.stopPropagation();if(zone.polygon.length>3){pushH();zone.polygon.splice(vi,1);pushToFB();redraw();}});
        vSvg.appendChild(h);

        const mh=mkCirc(mx,my,4,'var(--sur3)',col,'1.5');
        mh.setAttribute('opacity','0.7');mh.style.cursor='crosshair';mh.style.pointerEvents='all';
        mh.addEventListener('mousedown',e=>{
          e.preventDefault();e.stopPropagation();pushH();
          const nl=p2ll(mx,my);zone.polygon.splice(vi+1,0,nl);
          startDrag('zvtx',{zone,vtxIdx:vi+1,lat:nl[0],lng:nl[1]},e);
        });
        vSvg.appendChild(mh);

function drawTreeGrid(svg,zone,pxPts,col){
  if(!zone.rowSpacingM||!zone.treeSpacingM)return;

  const angleDeg=zone.rowAngleDeg??15;
  const rowScreenRad=(-90-angleDeg)*Math.PI/180;
  const perpScreenRad=rowScreenRad+Math.PI/2;
  const rux=Math.cos(rowScreenRad),ruy=Math.sin(rowScreenRad);
  const pux=Math.cos(perpScreenRad),puy=Math.sin(perpScreenRad);

  const ref=zone.polygon[0];
  const refPx=ll2p(ref[0],ref[1]);
  const refR=ll2p(ref[0],ref[1]+0.001),refD=ll2p(ref[0]+0.001,ref[1]);
  if(Math.abs(refR.x-refPx.x)<0.01||Math.abs(refD.y-refPx.y)<0.01)return;
  const mPerPx=(
    hav(ref,[ref[0],ref[1]+0.001])/Math.abs(refR.x-refPx.x)+
    hav(ref,[ref[0]+0.001,ref[1]])/Math.abs(refD.y-refPx.y)
  )/2;
  const rowStepPx=zone.treeSpacingM/mPerPx;
  const perpStepPx=zone.rowSpacingM/mPerPx;
  if(rowStepPx<4||perpStepPx<4||rowStepPx>500||perpStepPx>500)return;

  const cx=pxPts.reduce((a,p)=>a+p.x,0)/pxPts.length;
  const cy=pxPts.reduce((a,p)=>a+p.y,0)/pxPts.length;
  const diagLen=Math.hypot(
    Math.max(...pxPts.map(p=>p.x))-Math.min(...pxPts.map(p=>p.x)),
    Math.max(...pxPts.map(p=>p.y))-Math.min(...pxPts.map(p=>p.y))
  )*0.8;

  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('pointer-events','none');

  const maxSteps=Math.ceil(diagLen/Math.min(rowStepPx,perpStepPx))+2;
  let dotCount=0;
  const rowPts={};

  for(let ri=-maxSteps;ri<=maxSteps;ri++){
    for(let ti=-maxSteps;ti<=maxSteps;ti++){
      const sx=cx+ti*rowStepPx*rux+ri*perpStepPx*pux;
      const sy=cy+ti*rowStepPx*ruy+ri*perpStepPx*puy;
      if(!ptInPolyPx({x:sx,y:sy},pxPts))continue;
      dotCount++;
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',sx.toFixed(1));c.setAttribute('cy',sy.toFixed(1));
      c.setAttribute('r','2');c.setAttribute('fill',col);c.setAttribute('opacity','0.6');
      g.appendChild(c);
      if(!rowPts[ri])rowPts[ri]=[];
      rowPts[ri].push({x:sx,y:sy});
    }
  }

  // ── Slope-aware pipe layout ──────────────────────────────────────────
  // Slope data is stored on zone._slope (%), zone._aspect (deg from N, downhill direction).
  // If no slope data yet, fall back to simple flat layout.
  const slopePct=zone._slope||0;
  const aspectDeg=zone._aspect??null; // null = unknown/flat

  // Slope correction factor for pipe lengths: actual pipe > horizontal distance
  const slopeCorr=slopePct>0?1/Math.cos(Math.atan(slopePct/100)):1;

  // Determine which end of each lateral is "uphill" (where sub-main connects).
  // Uphill end = whichever lateral endpoint projects further in the uphill direction.
  // Uphill direction in screen space = aspect (downhill) + 180°.
  let aspectScreenRad=null;
  let uphillX=0,uphillY=-1; // default: uphill = north (screen up)
  if(aspectDeg!==null&&slopePct>1){
    const uphillDeg=(aspectDeg+180)%360;
    aspectScreenRad=(-90+uphillDeg)*Math.PI/180;
    uphillX=Math.cos(aspectScreenRad);uphillY=Math.sin(aspectScreenRad);
  }

  // Build lateral endpoints for each row
  const laterals=[]; // {start, end, length_m, ri}
  let totalLateralPx=0;
  let minRowProj=Infinity,maxRowProj=-Infinity;

  Object.entries(rowPts).forEach(([riStr,pts])=>{
    if(!pts.length)return;
    pts.sort((a,b)=>(a.x*rux+a.y*ruy)-(b.x*rux+b.y*ruy));
    const start=pts[0],end=pts[pts.length-1];
    const spanPx=pts.length>=2?Math.hypot(end.x-start.x,end.y-start.y):0;
    const lateralPx=spanPx+rowStepPx;
    totalLateralPx+=lateralPx;
    // Extend the lateral by half a step beyond first and last tree
    const extStart={x:start.x-rux*rowStepPx*0.5, y:start.y-ruy*rowStepPx*0.5};
    const extEnd  ={x:end.x  +rux*rowStepPx*0.5, y:end.y  +ruy*rowStepPx*0.5};
    // Clamp to polygon
    const s=ptInPolyPx(extStart,pxPts)?extStart:start;
    const e=ptInPolyPx(extEnd,pxPts)?extEnd:end;
    // Sub-main connects at the UPHILL end of this lateral.
    // Compare which endpoint (s or e) projects further in the uphill direction.
    const sProjUp=s.x*uphillX+s.y*uphillY;
    const eProjUp=e.x*uphillX+e.y*uphillY;
    const smEnd=sProjUp>eProjUp?s:e; // whichever is more uphill
    const midX=(s.x+e.x)/2,midY=(s.y+e.y)/2;
    const proj=midX*pux+midY*puy;
    if(proj<minRowProj)minRowProj=proj;
    if(proj>maxRowProj)maxRowProj=proj;
    laterals.push({s,e,smEnd,ri:parseInt(riStr),pts});
  });

  // Draw tree dots
  svg.appendChild(g);

  // Draw laterals (20mm drip lines)
  laterals.forEach(lat=>{
    if(lat.pts.length<1)return;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',lat.s.x.toFixed(1));line.setAttribute('y1',lat.s.y.toFixed(1));
    line.setAttribute('x2',lat.e.x.toFixed(1));line.setAttribute('y2',lat.e.y.toFixed(1));
    line.setAttribute('stroke',col);line.setAttribute('stroke-width','1.5');
    line.setAttribute('opacity','0.55');line.setAttribute('pointer-events','none');
    svg.appendChild(line);
    // Flow arrow on lateral (small triangle at ~1/3 from sub-main end)
    if(lat.pts.length>=2){
      const from=lat.smEnd===lat.s?lat.s:lat.e;
      const to  =lat.smEnd===lat.s?lat.e:lat.s;
      const t=0.4;
      const ax=from.x+(to.x-from.x)*t,ay=from.y+(to.y-from.y)*t;
      const len=Math.hypot(to.x-from.x,to.y-from.y);if(len>4){
        const ux=(to.x-from.x)/len,uy=(to.y-from.y)/len;
        const arr=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        arr.setAttribute('points',`${ax+ux*4},${ay+uy*4} ${ax-ux*3-uy*3},${ay-uy*3+ux*3} ${ax-ux*3+uy*3},${ay-uy*3-ux*3}`);
        arr.setAttribute('fill',col);arr.setAttribute('opacity','0.7');arr.setAttribute('pointer-events','none');
        svg.appendChild(arr);
      }
    }
  });

  // ── Sub-main line ────────────────────────────────────────────────────
  // Runs through all lateral sub-main connection points.
  // Sort by projection onto perpendicular axis (row-to-row direction).
  const smPts=laterals.map(l=>l.smEnd).sort((a,b)=>(a.x*pux+a.y*puy)-(b.x*pux+b.y*puy));

  if(smPts.length>=2){
    // Draw sub-main path connecting all lateral inlet points
    const smPath=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    smPath.setAttribute('points',smPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '));
    smPath.setAttribute('stroke','#ffffff');smPath.setAttribute('stroke-width','3');
    smPath.setAttribute('fill','none');smPath.setAttribute('opacity','0.85');
    smPath.setAttribute('stroke-linecap','round');smPath.setAttribute('stroke-linejoin','round');
    smPath.setAttribute('pointer-events','none');
    svg.appendChild(smPath);
    // Colored overlay on sub-main
    const smPath2=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    smPath2.setAttribute('points',smPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '));
    smPath2.setAttribute('stroke','#00cfff');smPath2.setAttribute('stroke-width','1.5');
    smPath2.setAttribute('fill','none');smPath2.setAttribute('opacity','0.9');
    smPath2.setAttribute('stroke-linecap','round');smPath2.setAttribute('stroke-linejoin','round');
    smPath2.setAttribute('pointer-events','none');
    svg.appendChild(smPath2);
    // Sub-main flow arrows
    for(let i=0;i<smPts.length-1;i++){
      const a=smPts[i],b=smPts[i+1];
      const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
      const len=Math.hypot(b.x-a.x,b.y-a.y);if(len<8)continue;
      const ux=(b.x-a.x)/len,uy=(b.y-a.y)/len;
      const arr=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      arr.setAttribute('points',`${mx+ux*5},${my+uy*5} ${mx-ux*4-uy*4},${my-uy*4+ux*4} ${mx-ux*4+uy*4},${my-uy*4-ux*4}`);
      arr.setAttribute('fill','#00cfff');arr.setAttribute('opacity','0.9');arr.setAttribute('pointer-events','none');
      svg.appendChild(arr);
    }
  }

  // ── Slope info label (if elevation data available) ───────────────────
  if(slopePct>0){
    const slbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    slbl.setAttribute('x',cx);slbl.setAttribute('y',cy+14);
    slbl.setAttribute('text-anchor','middle');slbl.setAttribute('fill','#facc15');
    slbl.setAttribute('font-size','9');slbl.setAttribute('font-family','-apple-system,sans-serif');
    slbl.setAttribute('pointer-events','none');slbl.setAttribute('opacity','0.9');
    const aspectName=aspectDeg!==null?compassDir(aspectDeg):'';
    slbl.textContent=`${slopePct.toFixed(1)}% slope${aspectName?' ↓'+aspectName:''}`;
    svg.appendChild(slbl);
    if(slopePct>5){
      const warn=document.createElementNS('http://www.w3.org/2000/svg','text');
      warn.setAttribute('x',cx);warn.setAttribute('y',cy+24);
      warn.setAttribute('text-anchor','middle');warn.setAttribute('fill','#f87171');
      warn.setAttribute('font-size','8');warn.setAttribute('font-family','-apple-system,sans-serif');
      warn.setAttribute('pointer-events','none');
      warn.textContent='⚠ PC emitters recommended';
      svg.appendChild(warn);
    }
  }

  // ── Elevation query button (if no slope data yet) ────────────────────
  if(zone._slope==null&&!zone._elevQuerying){
    const msg=zone._elevError||'Click to fetch slope data';
    const col=zone._elevError?'#f87171':'#60a5fa';
    const btn=document.createElementNS('http://www.w3.org/2000/svg','text');
    btn.setAttribute('x',cx);btn.setAttribute('y',cy+14);
    btn.setAttribute('text-anchor','middle');btn.setAttribute('fill',col);
    btn.setAttribute('font-size','9');btn.setAttribute('font-family','-apple-system,sans-serif');
    btn.setAttribute('cursor','pointer');btn.setAttribute('opacity','0.9');
    btn.textContent=zone._elevError?`⚠ ${msg} — click to retry`:`⊕ ${msg}`;
    btn.addEventListener('click',e=>{e.stopPropagation();fetchZoneElevation(zone);});
    svg.appendChild(btn);
  } else if(zone._elevQuerying){
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',cx);lbl.setAttribute('y',cy+14);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill','#94a3b8');
    lbl.setAttribute('font-size','9');lbl.setAttribute('font-family','-apple-system,sans-serif');
    lbl.setAttribute('pointer-events','none');
    lbl.textContent='Fetching elevation…';
    svg.appendChild(lbl);
  }

  // ── Store computed values ─────────────────────────────────────────────
  const subMainPx=(maxRowProj-minRowProj)+perpStepPx;
  const rowCount=Object.keys(rowPts).filter(k=>rowPts[k].length>0).length;
  zone._treeCount=dotCount;
  zone._rowCount=rowCount;
  zone._emitterCount=dotCount*(zone.emitters||2);
  zone._lateralM=totalLateralPx*mPerPx*slopeCorr;
  zone._subMainM=Math.max(0,subMainPx*mPerPx*slopeCorr);

  // ── Zone split suggestion ─────────────────────────────────────────────
  // Max allowable head loss per lateral = 2m (conservative, suits non-PC emitters).
  // If slope > 0: max lateral length before >2m head variation = 200/slope%.
  // If any lateral in the zone exceeds this, recommend a split.
  // Split line runs contour-parallel (perpendicular to slope direction),
  // positioned to divide the zone into equal-pressure bands.
  if(slopePct>0.5&&laterals.length>=2){
    const maxLateralM=200/slopePct; // metres
    const maxLateralPx=maxLateralM/mPerPx;
    const longestLateralPx=Math.max(...laterals.map(l=>
      Math.hypot(l.e.x-l.s.x,l.e.y-l.s.y)));

    if(longestLateralPx>maxLateralPx){
      // How many bands are needed?
      const nBands=Math.ceil(longestLateralPx/maxLateralPx);
      // Draw nBands-1 split lines across the zone at equal row-spacing intervals
      // Split lines run parallel to the row direction (along contour lines)
      const sortedLats=laterals.sort((a,b)=>{
        const pa=(a.s.x+a.e.x)/2*pux+(a.s.y+a.e.y)/2*puy;
        const pb=(b.s.x+b.e.x)/2*pux+(b.s.y+b.e.y)/2*puy;
        return pa-pb;
      });
      const totalRows=sortedLats.length;
      for(let band=1;band<nBands;band++){
        const splitIdx=Math.round(totalRows*band/nBands);
        if(splitIdx<=0||splitIdx>=totalRows)continue;
        const latA=sortedLats[splitIdx-1],latB=sortedLats[splitIdx];
        // Midpoint between two adjacent rows at the split boundary
        const midAx=(latA.s.x+latA.e.x)/2,midAy=(latA.s.y+latA.e.y)/2;
        const midBx=(latB.s.x+latB.e.x)/2,midBy=(latB.s.y+latB.e.y)/2;
        const splitCx=(midAx+midBx)/2,splitCy=(midAy+midBy)/2;
        // Draw split line through the centroid in the row direction
        // extended to cover the full zone width
        const halfLen=diagLen*1.2;
        const lx1=splitCx-rux*halfLen,ly1=splitCy-ruy*halfLen;
        const lx2=splitCx+rux*halfLen,ly2=splitCy+ruy*halfLen;
        // Clip to zone bounding box
        const sl=document.createElementNS('http://www.w3.org/2000/svg','line');
        sl.setAttribute('x1',lx1.toFixed(1));sl.setAttribute('y1',ly1.toFixed(1));
        sl.setAttribute('x2',lx2.toFixed(1));sl.setAttribute('y2',ly2.toFixed(1));
        sl.setAttribute('stroke','#facc15');sl.setAttribute('stroke-width','2');
        sl.setAttribute('stroke-dasharray','8,4');sl.setAttribute('opacity','0.9');
        sl.setAttribute('pointer-events','none');
        svg.appendChild(sl);
        // Label for the split band
        const bandLbl=document.createElementNS('http://www.w3.org/2000/svg','text');
        bandLbl.setAttribute('x',splitCx.toFixed(1));
        bandLbl.setAttribute('y',(splitCy-6).toFixed(1));
        bandLbl.setAttribute('text-anchor','middle');bandLbl.setAttribute('fill','#facc15');
        bandLbl.setAttribute('font-size','8');bandLbl.setAttribute('font-family','-apple-system,sans-serif');
        bandLbl.setAttribute('pointer-events','none');bandLbl.setAttribute('opacity','0.95');
        bandLbl.textContent=`✂ Split ${band}/${nBands-1} — separate pressure zone`;
        svg.appendChild(bandLbl);
      }
      // Overall warning label
      zone._splitNeeded=nBands;
      if(!zone._elevQuerying){
        const warn2=document.createElementNS('http://www.w3.org/2000/svg','text');
        warn2.setAttribute('x',cx.toFixed(1));warn2.setAttribute('y',(cy+34).toFixed(1));
        warn2.setAttribute('text-anchor','middle');warn2.setAttribute('fill','#facc15');
        warn2.setAttribute('font-size','8');warn2.setAttribute('font-family','-apple-system,sans-serif');
        warn2.setAttribute('pointer-events','none');warn2.setAttribute('opacity','0.95');
        warn2.textContent=`⚠ Split into ${nBands} pressure zones (max lateral ${maxLateralM.toFixed(0)}m at ${slopePct}% slope)`;
        svg.appendChild(warn2);
      }
    } else {
      zone._splitNeeded=null;
    }
  } else {
    zone._splitNeeded=null;
  }

  // ── Sub-main inlet point (lat/lng) ───────────────────────────────────
  // The inlet is ALWAYS the uphill end — water enters from above.
  // Uphill = the smPts end whose lat/lng has higher elevation proxy.
  // Without elevation data we use the aspect direction to determine which
  // end of the smPts array is uphill.
  if(smPts.length>=1){
    const smFirst=smPts[0],smLast=smPts[smPts.length-1];
    let inletPx,outletPx;
    if(aspectScreenRad!==null&&slopePct>1){
      // aspectScreenRad is downhill direction in screen space.
      // Uphill = opposite direction.
      const uphillRad=aspectScreenRad+Math.PI;
      const uphillX=Math.cos(uphillRad),uphillY=Math.sin(uphillRad);
      // Whichever smPts end projects further in uphill direction = the inlet
      const projFirst=smFirst.x*uphillX+smFirst.y*uphillY;
      const projLast =smLast.x *uphillX+smLast.y *uphillY;
      inletPx =projFirst>projLast?smFirst:smLast;
      outletPx=projFirst>projLast?smLast:smFirst;
    } else {
      // No slope data — default inlet at smPts[0] (arbitrary, user can tell from context)
      inletPx=smFirst;outletPx=smLast;
    }
    zone._smInletPx=inletPx;
    zone._smOutletPx=outletPx;
    zone._smInletLL=p2ll(inletPx.x,inletPx.y);
    zone._smOutletLL=p2ll(outletPx.x,outletPx.y);
    zone._aspectScreenRad=aspectScreenRad;
    zone._slopePct=slopePct;
  }
}

// ── ZONE-TO-MAIN-PIPE CONNECTIONS ─────────────────────────────────────
// Rules:
// 1. Only check from the sub-main INLET (uphill end) — that's where water enters.
// 2. If a main pipe (3″+) passes within 2×rowSpacingM of the zone's uphill edge,
//    no sub-main is needed — laterals connect directly to that pipe.
// 3. Otherwise, find the nearest main pipe and connect perpendicularly
//    (run feeder along slope direction or contour, not diagonally).
// 4. The feeder route: from sub-main inlet, go straight uphill until hitting
//    the main pipe. If the main pipe is more "across slope", go along contour.
function drawZoneConnections(){
  if(!lyr.zo)return;
  const mainDias=['3','4','5'];
  const maxSearchM=400;

  zones.forEach(zone=>{
    if(zone.type==='tank')return;
    if(!zone._smInletLL)return;

    const inletLL=zone._smInletLL;
    const inletPx=zone._smInletPx;
    const rowSpM=zone.rowSpacingM||7;
    const slopePct=zone._slopePct||0;
    const aspectScreenRad=zone._aspectScreenRad??null;

    // Build list of candidate main pipes with their closest point to the inlet
    const mainPipes=pipes.filter(p=>
      mainDias.includes(p.dia)&&
      p.pts.length>=2&&
      p.status!=='damaged'
    );
    if(!mainPipes.length)return;

    let bestDist=Infinity,bestConnPt=null,bestPipe=null;
    mainPipes.forEach(pipe=>{
      for(let i=0;i<pipe.pts.length-1;i++){
        const cp=closestOnSeg(inletLL,pipe.pts[i],pipe.pts[i+1]);
        if(cp.d<bestDist&&cp.d<maxSearchM){
          bestDist=cp.d;bestConnPt=cp.pt;bestPipe=pipe;
        }
      }
    });
    if(!bestPipe)return;

    const connPx=ll2p(bestConnPt[0],bestConnPt[1]);
    const directDistM=bestDist;

    // ── Case 1: Main pipe very close to uphill edge → direct lateral connection ──
    // If the main pipe is within 2 row spacings of the inlet, it can act as the
    // header directly. Show laterals notionally connecting to it (no sub-main needed).
    if(directDistM<rowSpM*2){
      zone._connMode='direct'; // laterals connect straight to main pipe
      zone._connDist=Math.round(directDistM);
      zone._connDia=bestPipe.dia;
      // Draw a "direct" marker — small green tick on the main pipe at connection point
      const tick=mkCirc(connPx.x,connPx.y,6,'#4ade80','#fff','1.5');
      tick.setAttribute('pointer-events','none');zSvg.appendChild(tick);
      const tlbl=document.createElementNS('http://www.w3.org/2000/svg','text');
      tlbl.setAttribute('x',(connPx.x+10).toFixed(1));tlbl.setAttribute('y',(connPx.y-5).toFixed(1));
      tlbl.setAttribute('fill','#4ade80');tlbl.setAttribute('font-size','8');
      tlbl.setAttribute('font-family','-apple-system,sans-serif');
      tlbl.setAttribute('pointer-events','none');
      tlbl.textContent=`✓ Direct from ${bestPipe.dia}″`;
      zSvg.appendChild(tlbl);
      return;
    }

    // ── Case 2: Need a feeder pipe from sub-main inlet to main pipe ──────────
    // Determine the best routing: uphill or across-slope.
    // We compute the angle between the feeder direction and the slope direction.
    // If the main pipe runs mostly across the slope (contour-parallel),
    // the feeder should run uphill (perpendicular to main).
    // If the main pipe runs mostly up the slope, feeder runs across slope.
    // Either way the ideal feeder is a straight line that hits the main pipe
    // at close to 90°, which the closestOnSeg already gives us.
    // The issue is we want the ROUTE to follow terrain sensibly.
    // Routing logic: extend from inlet in the uphill direction until we
    // hit the perpendicular foot on the main pipe. This avoids diagonal cuts.

    let routePts=[inletPx,connPx]; // default: straight line
    if(aspectScreenRad!==null&&slopePct>1){
      // Uphill direction in screen space
      const uphillRad=aspectScreenRad+Math.PI; // opposite of downhill
      const ux=Math.cos(uphillRad),uy=Math.sin(uphillRad);
      // Project connPx onto the line from inletPx in uphill direction
      const dx=connPx.x-inletPx.x,dy=connPx.y-inletPx.y;
      const tUp=dx*ux+dy*uy; // how far uphill the main pipe is
      // Right-angle direction (across slope = along contour)
      const cx2=inletPx.x+ux*tUp;
      const cy2=inletPx.y+uy*tUp;
      // Route: go uphill first to the main pipe's elevation, then across slope
      // Only add the elbow if it meaningfully differs from straight line
      const elbowPx={x:cx2,y:cy2};
      const elbowDistFromStraight=Math.hypot(
        elbowPx.x-(inletPx.x+connPx.x)/2,
        elbowPx.y-(inletPx.y+connPx.y)/2
      );
      if(elbowDistFromStraight>15){
        // Two-segment route: up the slope, then across to the main pipe
        routePts=[inletPx,elbowPx,connPx];
      }
    }

    // Draw feeder route
    const routePath=document.createElementNS('http://www.w3.org/2000/svg','polyline');
    routePath.setAttribute('points',routePts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '));
    routePath.setAttribute('stroke','#fb923c');routePath.setAttribute('stroke-width','2');
    routePath.setAttribute('stroke-dasharray','7,3');routePath.setAttribute('fill','none');
    routePath.setAttribute('opacity','0.9');routePath.setAttribute('pointer-events','none');
    zSvg.appendChild(routePath);

    // Inlet dot
    const dot1=mkCirc(inletPx.x,inletPx.y,5,'#fb923c','#fff','1.5');
    dot1.setAttribute('pointer-events','none');zSvg.appendChild(dot1);

    // Connection point ring on main pipe
    const dot2=mkCirc(connPx.x,connPx.y,5,'none','#fb923c','2');
    dot2.setAttribute('pointer-events','none');zSvg.appendChild(dot2);

    // Label at midpoint of route with distance and click-to-draw
    const midPt=routePts[Math.floor(routePts.length/2)];
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',midPt.x.toFixed(1));lbl.setAttribute('y',(midPt.y-7).toFixed(1));
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill','#fb923c');
    lbl.setAttribute('font-size','9');lbl.setAttribute('font-weight','bold');
    lbl.setAttribute('font-family','-apple-system,sans-serif');
    lbl.setAttribute('pointer-events','all');lbl.style.cursor='pointer';
    lbl.setAttribute('opacity','0.95');
    // Feeder pipe length = straight-line distance in metres (already computed)
    const feederM=directDistM;
    lbl.textContent=`→ ${bestPipe.dia}″ · ${feederM.toFixed(0)}m feeder`;
    // Click = start drawing this feeder pipe
    lbl.addEventListener('click',e=>{
      e.stopPropagation();
      setTool('pipe');setPSt('planned');
      drawPts=[inletLL];
      // Add elbow point if two-segment route
      if(routePts.length===3){
        const elbowLL=p2ll(routePts[1].x,routePts[1].y);
        drawPts.push(elbowLL);
      }
      drawPts.push([...bestConnPt]);
      ghostPt=bestConnPt;updateGhost();
    });
    zSvg.appendChild(lbl);

    zone._connMode='feeder';
    zone._connDist=Math.round(directDistM);
    zone._connDia=bestPipe.dia;
  });
}

function compassDir(deg){
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5)%16];
}
window.compassDir=compassDir;

// ── ELEVATION QUERY ───────────────────────────────────────────────────
// Uses Open-Topo-Data SRTM 30m API (free, no key needed).
// Queries a grid of points inside the zone polygon, fits a slope plane,
// computes slope % and aspect direction.
async function fetchZoneElevation(zone){
  if(!zone||zone._elevQuerying)return;
  zone._elevQuerying=true;
  zone._elevError=null;
  redraw();

  try{
    const poly=zone.polygon;
    const latMin=Math.min(...poly.map(p=>p[0])),latMax=Math.max(...poly.map(p=>p[0]));
    const lngMin=Math.min(...poly.map(p=>p[1])),lngMax=Math.max(...poly.map(p=>p[1]));
    const gridN=5; // 5×5 = 25 points max
    const pts=[];
    // Always include polygon corners
    poly.forEach(p=>pts.push([p[0],p[1]]));
    // Add interior grid points
    for(let i=0;i<=gridN;i++){
      for(let j=0;j<=gridN;j++){
        const lat=latMin+(latMax-latMin)*i/gridN;
        const lng=lngMin+(lngMax-lngMin)*j/gridN;
        if(ptInPolyLL([lat,lng],poly))pts.push([lat,lng]);
      }
    }
    // Deduplicate and limit to 100
    const uniq=pts.slice(0,99);
    if(uniq.length<3){
      zone._elevQuerying=false;
      zone._elevError='Zone too small for elevation query';
      redraw();return;
    }

    const locations=uniq.map(p=>`${p[0].toFixed(6)},${p[1].toFixed(6)}`).join('|');
    const url=`https://api.opentopodata.org/v1/srtm30m?locations=${locations}`;
    const res=await fetch(url,{headers:{'Accept':'application/json'}});
    if(res.status===429){throw new Error('Rate limited — wait 1 minute and try again');}
    if(!res.ok){throw new Error('API returned '+res.status);}
    const data=await res.json();
    if(data.status!=='OK'){throw new Error('API: '+data.status+(data.error?' — '+data.error:''));}

    const elevPts=data.results
      .map((r,i)=>({lat:uniq[i][0],lng:uniq[i][1],elev:r.elevation}))
      .filter(p=>p.elev!=null&&!isNaN(p.elev));
    if(elevPts.length<3){throw new Error('Not enough valid elevation points returned');}

    // Fit plane z = a*lat + b*lng + c (least squares)
    const n=elevPts.length;
    let sLat=0,sLng=0,sE=0,sLat2=0,sLng2=0,sLatLng=0,sLatE=0,sLngE=0;
    elevPts.forEach(p=>{
      sLat+=p.lat;sLng+=p.lng;sE+=p.elev;
      sLat2+=p.lat**2;sLng2+=p.lng**2;sLatLng+=p.lat*p.lng;
      sLatE+=p.lat*p.elev;sLngE+=p.lng*p.elev;
    });
    const A=[[sLat2,sLatLng,sLat],[sLatLng,sLng2,sLng],[sLat,sLng,n]];
    const B=[sLatE,sLngE,sE];
    const coeffs=solveLinear3(A,B);
    if(!coeffs){throw new Error('Could not fit slope plane to elevation data');}
    const [a,b]=coeffs;

    const cosLat=Math.cos((latMin+latMax)/2*Math.PI/180);
    const dzdx=b/(111320*cosLat);
    const dzdy=a/111320;
    const slopePct=Math.sqrt(dzdx**2+dzdy**2)*100;
    const aspectRad=Math.atan2(-dzdx,-dzdy);
    const aspectDeg=(aspectRad*180/Math.PI+360)%360;
    const elevArr=elevPts.map(p=>p.elev);
    const elevRange=Math.max(...elevArr)-Math.min(...elevArr);

    zone._slope=Math.round(slopePct*10)/10;
    zone._aspect=Math.round(aspectDeg);
    zone._elevRange=Math.round(elevRange*10)/10;
    zone._elevQuerying=false;
    zone._elevError=null;
    pushToFB();
    redraw();
    // Refresh card if open
    if(selZone?.id===zone.id)showZoneCard(zone);
  }catch(err){
    console.warn('Elevation query failed:',err.message);
    zone._elevQuerying=false;
    zone._elevError=err.message;
    redraw();
    if(selZone?.id===zone.id)showZoneCard(zone);
  }
}
window.fetchZoneElevation=fetchZoneElevation;

function ptInPolyLL(pt,polygon){
  // Ray-casting in lat/lng space
  let inside=false;
  for(let i=0,j=polygon.length-1;i<polygon.length;j=i++){
    if(((polygon[i][0]>pt[0])!==(polygon[j][0]>pt[0]))&&
       (pt[1]<(polygon[j][1]-polygon[i][1])*(pt[0]-polygon[i][0])/(polygon[j][0]-polygon[i][0])+polygon[i][1]))
      inside=!inside;
  }
  return inside;
}

function solveLinear3(A,B){
  // Gaussian elimination for 3×3 system Ax=B
  const M=A.map((row,i)=>[...row,B[i]]);
  for(let col=0;col<3;col++){
    let maxRow=col;
    for(let row=col+1;row<3;row++)if(Math.abs(M[row][col])>Math.abs(M[maxRow][col]))maxRow=row;
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    if(Math.abs(M[col][col])<1e-12)return null;
    for(let row=col+1;row<3;row++){
      const f=M[row][col]/M[col][col];
      for(let k=col;k<=3;k++)M[row][k]-=f*M[col][k];
    }
  }
  const x=[0,0,0];
  for(let i=2;i>=0;i--){
    x[i]=M[i][3];
    for(let j=i+1;j<3;j++)x[i]-=M[i][j]*x[j];
    x[i]/=M[i][i];
  }
  return x;
}

function drawTankFill(svg,pts,col,zone){
  // Use fillPct if available, fall back to waterLevel/maxDepth
  const fillPct=zone.fillPct!=null
    ?zone.fillPct
    :(zone.maxDepth&&zone.waterLevel!=null?Math.round(zone.waterLevel/zone.maxDepth*100):0);
  const frac=Math.min(1,Math.max(0,fillPct/100));
  if(frac<=0)return;

  const minY=Math.min(...pts.map(p=>p.y)),maxY=Math.max(...pts.map(p=>p.y));
  const cx=pts.reduce((a,p)=>a+p.x,0)/pts.length;
  const fillY=maxY-(maxY-minY)*frac;

  // Clip fill to polygon shape
  const clipId='clip_'+Math.random().toString(36).slice(2,7);
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const cp=document.createElementNS('http://www.w3.org/2000/svg','clipPath');
  cp.setAttribute('id',clipId);
  const cpoly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  cpoly.setAttribute('points',pts.map(p=>p.x+','+p.y).join(' '));
  cp.appendChild(cpoly);defs.appendChild(cp);svg.appendChild(defs);

  const minX=Math.min(...pts.map(p=>p.x))-5,maxX=Math.max(...pts.map(p=>p.x))+5;

  // Water fill body
  const fill=document.createElementNS('http://www.w3.org/2000/svg','rect');
  fill.setAttribute('x',minX);fill.setAttribute('y',fillY);
  fill.setAttribute('width',maxX-minX);fill.setAttribute('height',maxY-fillY+10);
  fill.setAttribute('fill','#58a6ff');fill.setAttribute('fill-opacity','0.28');
  fill.setAttribute('clip-path',`url(#${clipId})`);
  svg.appendChild(fill);

  // Waterline
  const wline=document.createElementNS('http://www.w3.org/2000/svg','line');
  wline.setAttribute('x1',minX);wline.setAttribute('y1',fillY);
  wline.setAttribute('x2',maxX);wline.setAttribute('y2',fillY);
  wline.setAttribute('stroke','#58a6ff');wline.setAttribute('stroke-width','1.5');
  wline.setAttribute('stroke-dasharray','4,3');wline.setAttribute('opacity','0.7');
  wline.setAttribute('clip-path',`url(#${clipId})`);
  svg.appendChild(wline);

  // Percentage label at waterline
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',cx);lbl.setAttribute('y',fillY-5);
  lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill','#58a6ff');
  lbl.setAttribute('font-size','10');lbl.setAttribute('font-weight','bold');
  lbl.setAttribute('font-family','-apple-system,sans-serif');
  lbl.setAttribute('pointer-events','none');
  lbl.textContent=`${fillPct}%`;
  svg.appendChild(lbl);
}

function ptInPolyPx(pt,polygon){
  let inside=false;
  for(let i=0,j=polygon.length-1;i<polygon.length;j=i++){
    if(((polygon[i].y>pt.y)!==(polygon[j].y>pt.y))&&
       (pt.x<(polygon[j].x-polygon[i].x)*(pt.y-polygon[i].y)/(polygon[j].y-polygon[i].y)+polygon[i].x))
      inside=!inside;
  }
  return inside;
}

// ── GHOST ─────────────────────────────────────────────────────────────
function updateGhost(){
  gSvg.innerHTML='';
  if(!ghostPt)return;
  if(tool==='pipe'&&drawPts.length>0){
    const last=drawPts[drawPts.length-1];
    angSnap=computeAngSnap(last[0],last[1],ghostPt[0],ghostPt[1]);
    const snap=findSnap(ghostPt[0],ghostPt[1],null);
    const lastPx=ll2p(last[0],last[1]);
    const gPx=ll2p(ghostPt[0],ghostPt[1]);
    const nearLast=drawPts.length>=2&&pixDist(gPx,lastPx)<16;
    let endPt=nearLast?last:(snap?snap.pt:applyAngSnap(last[0],last[1],ghostPt[0],ghostPt[1],angSnap));
    const col=nearLast?'#4ade80':(snap?'#4ade80':'#58a6ff');
    const pxpts=[...drawPts,endPt].map(p=>ll2p(p[0],p[1]));
    const g=mkPath(pxpts,col,PW[dia]||3,'6,4',0.7);if(g)gSvg.appendChild(g);
    // placed point dots
    drawPts.forEach((pt,i)=>{
      const p=ll2p(pt[0],pt[1]);
      const c=mkCirc(p.x,p.y,i===0?5:3,i===0?'#fff':'#58a6ff','none','0');
      c.setAttribute('opacity','0.85');gSvg.appendChild(c);
    });
    const epx=ll2p(endPt[0],endPt[1]);
    if(nearLast){
      const ring=mkCirc(lastPx.x,lastPx.y,12,'none','#4ade80','2');ring.setAttribute('opacity','0.6');gSvg.appendChild(ring);
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',lastPx.x);txt.setAttribute('y',lastPx.y-18);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('fill','#4ade80');txt.setAttribute('font-size','10');txt.setAttribute('font-family','-apple-system,sans-serif');txt.setAttribute('pointer-events','none');
      txt.textContent='Click to finish';gSvg.appendChild(txt);
    } else {
      const c=mkCirc(epx.x,epx.y,snap?8:4,'none',col,'2');gSvg.appendChild(c);
      // angle guide
      if(angSnap!==null){
        const p=ll2p(last[0],last[1]),rad=angSnap*Math.PI/180,len=3000;
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',p.x-len*Math.cos(rad));line.setAttribute('y1',p.y-len*Math.sin(rad));
        line.setAttribute('x2',p.x+len*Math.cos(rad));line.setAttribute('y2',p.y+len*Math.sin(rad));
        line.setAttribute('stroke','rgba(96,165,250,0.25)');line.setAttribute('stroke-width','1');line.setAttribute('stroke-dasharray','6,6');
        gSvg.appendChild(line);
      }
    }
    updateSnapRing(snap,endPt);
  } else if(tool==='zone'&&drawPts.length>0){
    const firstPx=ll2p(drawPts[0][0],drawPts[0][1]);
    const gPx=ll2p(ghostPt[0],ghostPt[1]);
    const nearFirst=drawPts.length>=3&&pixDist(gPx,firstPx)<18;
    const endPt=nearFirst?drawPts[0]:ghostPt;
    const col=pendingZoneType==='tank'?'#fb923c':'#4ade80';
    const pxpts=[...drawPts,endPt].map(p=>ll2p(p[0],p[1]));
    const g=mkPath(pxpts,col,1.5,'5,4',0.7);if(g)gSvg.appendChild(g);
    drawPts.forEach((pt,i)=>{
      const p=ll2p(pt[0],pt[1]);
      const r=i===0?7:3;
      const c=mkCirc(p.x,p.y,r,i===0?col:'none',col,'2');
      c.setAttribute('opacity','0.9');gSvg.appendChild(c);
      if(i===0&&drawPts.length>=3){
        const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
        txt.setAttribute('x',p.x);txt.setAttribute('y',p.y-14);
        txt.setAttribute('text-anchor','middle');txt.setAttribute('fill',col);txt.setAttribute('font-size','10');txt.setAttribute('font-family','-apple-system,sans-serif');txt.setAttribute('pointer-events','none');
        txt.textContent=nearFirst?'Click to close':'';gSvg.appendChild(txt);
      }
    });
    if(nearFirst)updateSnapRing({type:'endpoint'},drawPts[0]);
    else updateSnapRing(null,null);
  } else updateSnapRing(null,null);
}

function updateSnapRing(snap,pt){
  const r=document.getElementById('snap-ring');
  if(!snap||!pt){r.style.display='none';return;}
  const px=ll2p(pt[0],pt[1]);
  r.style.display='block';r.style.left=px.x+'px';r.style.top=px.y+'px';
  const col=snap.type==='node'?'var(--warn)':snap.type==='midspan'?'var(--pump)':'var(--ok)';
  const sz=snap.type==='midspan'?18:22;
  r.style.borderColor=col;r.style.width=r.style.height=sz+'px';
}

// ── DRAW LOGIC ────────────────────────────────────────────────────────
function handlePipeClick(ll){
  const snap=findSnap(ll[0],ll[1],null);
  let pt=snap?snap.pt:(drawPts.length>0?applyAngSnap(drawPts[drawPts.length-1][0],drawPts[drawPts.length-1][1],ll[0],ll[1],angSnap):ll);
  // snap midspan on first click = split and start from there
  if(drawPts.length===0&&snap?.type==='midspan'){
    pushH();const sp=splitPipe(pipes.find(p=>p.id===snap.pipeId),snap.segIdx,snap.pt);pt=sp;
  }
  // finish if near last point (pixel check)
  if(drawPts.length>=2){
    const lpx=ll2p(drawPts[drawPts.length-1][0],drawPts[drawPts.length-1][1]);
    const ppx=ll2p(pt[0],pt[1]);
    if(pixDist(lpx,ppx)<16){finishPipe();return;}
  }
  drawPts.push(pt);updateGhost();
}
function handleNodePipeClick(nd){
  // Start pipe from node position
  if(drawPts.length===0){drawPts=[[nd.lat,nd.lng]];ghostPt=[nd.lat,nd.lng];updateGhost();}
  else handlePipeClick([nd.lat,nd.lng]);
}

function handleZoneClick(ll){
  if(drawPts.length>=3){
    const fpx=ll2p(drawPts[0][0],drawPts[0][1]),cpx=ll2p(ll[0],ll[1]);
    if(pixDist(fpx,cpx)<18){finishZone();return;}
  }
  drawPts.push(ll);updateGhost();
}

window.finishDraw=function(){if(tool==='pipe')finishPipe();else if(tool==='zone')finishZone();};
window.cancelDraw=cancelDraw;
function cancelDraw(){drawPts=[];angSnap=null;gSvg.innerHTML='';pendingZoneType='zone';updateZoneToolColor();updateSnapRing(null,null);}

function finishPipe(){
  if(drawPts.length<2){cancelDraw();return;}
  pushH();
  // resolve midspan endpoints
  const ss=findSnap(drawPts[0][0],drawPts[0][1],null);
  let s=drawPts[0];
  if(ss?.type==='midspan'){s=splitPipe(pipes.find(p=>p.id===ss.pipeId),ss.segIdx,ss.pt);}
  const es=findSnap(drawPts[drawPts.length-1][0],drawPts[drawPts.length-1][1],null);
  let e=drawPts[drawPts.length-1];
  if(es?.type==='midspan'){e=splitPipe(pipes.find(p=>p.id===es.pipeId),es.segIdx,es.pt);}
  const pts=[s,...drawPts.slice(1,-1),e];
  const pipe={id:'p'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
    label:'Pipe '+pc++,pts,dia,status:pipeSt,isReuse:false,valveState:'open'};
  pipes.push(pipe);cancelDraw();selPipe=pipe;
  pushToFB();redraw();showPipeCard(pipe);
}

function finishZone(){
  if(drawPts.length<3){cancelDraw();return;}
  pushH();
  const isTank=pendingZoneType==='tank';
  const zone={id:'z'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
    label:(isTank?'Tank ':'Zone ')+zc++,polygon:[...drawPts],
    rowSpacingM:7,treeSpacingM:7,emitters:2,lhrPerEmitter:4,rowAngleDeg:15,pricePerTree:0,subMainDia:'1.5',
    color:isTank?'#fb923c':ZONE_COLS[zones.filter(z=>z.type!=='tank').length%ZONE_COLS.length],
    type:isTank?'tank':'zone',
    ...(isTank?{wallType:'vertical',fillPct:50,waterLevel:1.5,maxDepth:3,maxFlowM3h:5,soilAngle:45}:{})};
  zones.push(zone);cancelDraw();selZone=zone;
  pushToFB();redraw();showZoneCard(zone);
}

  else if(selZone){if(!confirm('Delete zone?'))return;pushH();zones=zones.filter(z=>z.id!==selZone.id);selZone=null;}
  else return;
  closeCard();pushToFB();redraw();
};

function showZoneCard(zone){
  if(!zone)return;
  const c=document.getElementById('pcard');
  const area=polyArea(zone.polygon);const areaDun=(area/1000).toFixed(1);
  const isTank=zone.type==='tank';
  // Tank volume calc
  let volHtml='';
  if(isTank){
    const wt=zone.wallType||'vertical';
    const md=zone.maxDepth||3;
    const sa=zone.soilAngle||45;
    let vol=0;
    if(wt==='vertical'){
      vol=area*md; // m² × m = m³
    } else {
      // Sloped earthen walls: each wall slopes inward at soilAngle from horizontal.
      // Horizontal setback per wall = depth / tan(soilAngle).
      // The base of the tank is the top surface shrunk inward by setback on all sides.
      // Volume = (topArea + baseArea) / 2 × depth  (average of top and base cross-sections)
      const slope=md/Math.tan(sa*Math.PI/180);
      const perim=polygonPerim(zone.polygon);
      // Shrink area by perimeter×setback (Minkowski erosion approximation)
      const baseArea=Math.max(0,area-perim*slope+Math.PI*slope*slope);
      vol=(area+baseArea)/2*md;
    }
    zone._volumeM3=vol;
    // Fill percentage (0-100). waterLevel stores fill pct for tanks.
    const fillPct=zone.fillPct??Math.round((zone.waterLevel??2)/(md)*100);
    const fillVol=vol*(fillPct/100);
    volHtml=`<div class="pc-hint" style="margin-top:4px">
      Total capacity: <b>~${vol.toFixed(0)}m³</b> (${(vol*1000).toFixed(0)}L)<br>
      Current fill: <b>${fillPct}%</b> = ~${fillVol.toFixed(0)}m³
    </div>`;
  }
  const rsp=zone.rowSpacingM||7,tsp=zone.treeSpacingM||7;
  const trees=zone._treeCount??Math.round(area/(rsp*tsp));
  c.innerHTML=`<div class="pc-h" style="color:${zone.color}">${isTank?'TANK POOL':'ZONE'} — ${zone.label}</div>
    <div class="pc-r"><label>Name</label><input id="pc-zn" value="${zone.label}"></div>
    ${isTank?`<div class="pc-r"><label>Wall type</label><select id="pc-wt">
      <option value="vertical"${(zone.wallType||'vertical')==='vertical'?' selected':''}>Vertical (concrete/block)</option>
      <option value="sloped"${zone.wallType==='sloped'?' selected':''}>Sloped (earthen — soil shear)</option>
    </select></div>
    <div class="pc-r"><label>Max depth (m)</label><input id="pc-md" type="number" value="${zone.maxDepth||3}" min="0.5" step="0.1"></div>
    <div id="pc-slope-row" class="pc-r" style="${(zone.wallType||'vertical')==='sloped'?'':'display:none'}"><label>Soil angle (°)</label><input id="pc-sa" type="number" value="${zone.soilAngle||45}" min="20" max="80"></div>
    <div class="pc-r"><label>Fill level (%)</label>
      <div style="flex:1;display:flex;align-items:center;gap:6px">
        <input id="pc-fp" type="range" min="0" max="100" value="${zone.fillPct??Math.round(((zone.waterLevel||2)/(zone.maxDepth||3))*100)}" style="flex:1;accent-color:var(--info)">
        <span id="pc-fp-val" style="font-size:11px;color:var(--info);width:32px;text-align:right">${zone.fillPct??Math.round(((zone.waterLevel||2)/(zone.maxDepth||3))*100)}%</span>
      </div>
    </div>
    <div class="pc-r"><label>Max flow (m³/hr)</label><input id="pc-mf" type="number" value="${zone.maxFlowM3h||5}" min="0"></div>
    ${volHtml}`
    :`<div class="pc-r"><label>Row direction</label>
    <select id="pc-ra">
      <option value="0"${(zone.rowAngleDeg??15)===0?' selected':''}>0° — rows run N-S</option>
      <option value="15"${(zone.rowAngleDeg??15)===15?' selected':''}>15° CCW — NNW (olive typical)</option>
      <option value="30"${(zone.rowAngleDeg??15)===30?' selected':''}>30° CCW — NNW-SSE</option>
      <option value="45"${(zone.rowAngleDeg??15)===45?' selected':''}>45° CCW — NW-SE diagonal</option>
      <option value="60"${(zone.rowAngleDeg??15)===60?' selected':''}>60° CCW — WNW-ESE</option>
      <option value="75"${(zone.rowAngleDeg??15)===75?' selected':''}>75° CCW — nearly W-E</option>
      <option value="90"${(zone.rowAngleDeg??15)===90?' selected':''}>90° — rows run E-W</option>
      <option value="-15"${(zone.rowAngleDeg??15)===-15?' selected':''}>15° CW — NNE</option>
      <option value="-45"${(zone.rowAngleDeg??15)===-45?' selected':''}>45° CW — NE-SW diagonal</option>
    </select></div>
    <div class="pc-r"><label>Sub-main dia</label>
    <select id="pc-smd">
      <option value="1.5"${(zone.subMainDia||'1.5')==='1.5'?' selected':''}>1½″ — standard</option>

        :zone._elevError

      <button class="pcb" style="height:20px;font-size:9px;padding:0 6px;margin-left:auto" onclick="fetchZoneElevation(zones.find(z=>z.id==='${zone.id}'))">${zone._elevQuerying?'Fetching…':zone._slope!=null?'⊕ Re-fetch':'⊕ Fetch slope'}</button>
    </div>`}
    <div class="pc-hint">${areaDun} dunum · ${area.toFixed(0)}m²</div>
    <div class="pc-btns">
      <button class="pcb ok" onclick="applyZone('${zone.id}')">✓ Apply</button>
      <button class="pcb del" onclick="deleteSelected()">× Delete</button>

    </div>`;
  // live update tree calc and wall type toggle
  ['pc-ra','pc-smd','pc-rs','pc-ts','pc-em','pc-lr','pc-pt'].forEach(id=>{
    document.getElementById(id)?.addEventListener('change',refreshZoneCalc);

    zone.rowAngleDeg=parseFloat(document.getElementById('pc-ra')?.value)??15;

}

// Returns the calc hint string for a zone, using actual tree count from grid
// if available (_treeCount set by drawTreeGrid), otherwise falling back to
// area/spacing approximation.
function zoneCalcStr(zone,area,areaDun){
  const trees=zone._treeCount??Math.round((area||0)/((zone.rowSpacingM||7)*(zone.treeSpacingM||7)));
  const rows=zone._rowCount??0;
  const emitters=zone._emitterCount??(trees*(zone.emitters||2));
  const dem=(trees*(zone.emitters||2)*(zone.lhrPerEmitter||4)/1000).toFixed(2);
  const price=zone.pricePerTree||0;
  const totalPrice=price>0?trees*price:null;

  let pipeStr='';
  if(zone._lateralM!=null&&zone._subMainM!=null){
    const lat=zone._lateralM,sub=zone._subMainM;
    const latStr=lat>999?`${(lat/1000).toFixed(2)}km`:`${lat.toFixed(0)}m`;
    const subStr=sub>999?`${(sub/1000).toFixed(2)}km`:`${sub.toFixed(0)}m`;
    pipeStr=`\n20mm lateral: ${latStr} · ${zone.subMainDia||'1.5'}″ sub-main: ~${subStr}`
           +`\nFeeders: ${rows} · Drip emitters: ${emitters.toLocaleString()}`;
  }
  let splitStr='';
  if(zone._splitNeeded>1){
    splitStr=`\n⚠ Split into ${zone._splitNeeded} pressure zones recommended`;
  }
  let connStr='';
  if(zone._connDist!=null){
    connStr=`\n→ Nearest ${zone._connDia}″ main: ${zone._connDist}m feeder needed`;
  }
  const priceStr=totalPrice!=null?`\nZone cost: ${totalPrice.toLocaleString()} JD  (${price} JD/tree × ${trees})`:'';
  return `${areaDun} dun · ${trees} trees · ${dem} m³/hr${pipeStr}${splitStr}${connStr}${priceStr}`;
}

// ── DRAG SYSTEM ───────────────────────────────────────────────────────
function startDrag(type,payload,e){
  if(e.preventDefault)e.preventDefault();
  if(e.stopPropagation)e.stopPropagation();
  const spx=ll2p(payload.lat,payload.lng);
  activeDrag={type,payload,scx:e.clientX,scy:e.clientY,spx:spx.x,spy:spx.y};
  document.body.style.cursor='grabbing';
  document.addEventListener('mousemove',onDM,{passive:false});
  document.addEventListener('mouseup',onDU,{once:true});
}
function onDM(e){
  if(!activeDrag)return;
  const dx=e.clientX-activeDrag.scx,dy=e.clientY-activeDrag.scy;
  const nl=p2ll(activeDrag.spx+dx,activeDrag.spy+dy);
  const snap=findSnap(nl[0],nl[1],activeDrag.type==='ppt'?activeDrag.payload.pipe.id:null);
  const fl=snap&&activeDrag.type!=='zvtx'?snap.pt:nl;
  updateSnapRing(snap,fl);
  if(activeDrag.type==='node'){activeDrag.payload.node.lat=fl[0];activeDrag.payload.node.lng=fl[1];drawNodes();drawPipes();}
  else if(activeDrag.type==='ppt'){activeDrag.payload.pipe.pts[activeDrag.payload.ptIdx]=fl;drawPipes();}
  else if(activeDrag.type==='zvtx'){activeDrag.payload.zone.polygon[activeDrag.payload.vtxIdx]=fl;drawZones();}
}
function onDU(){
  if(!activeDrag)return;
  document.removeEventListener('mousemove',onDM);
  document.body.style.cursor='';updateSnapRing(null,null);
  pushToFB();redraw();activeDrag=null;
}
document.addEventListener('mouseup',()=>{if(activeDrag){document.body.style.cursor='';document.removeEventListener('mousemove',onDM);updateSnapRing(null,null);activeDrag=null;}},{passive:true});

// ── PROCUREMENT ───────────────────────────────────────────────────────
function calcProc(){
  const stock={},needed={};
  const sz=['5','4','3','2','20mm'];sz.forEach(s=>{stock[s]=0;needed[s]=0;});
  pipes.forEach(p=>{
    const l=pipeLenM(p),s=p.dia;
    // Stock = only clean existing pipes (not damaged, not reuse copies)
    if(p.status==='existing'&&!p.isReuse) stock[s]=(stock[s]||0)+l;
    // Needed = planned new + reuse copies only — damaged is informational, ignored for procurement
    else if(p.status==='planned') needed[s]=(needed[s]||0)+l;
  });
  return sz.map(s=>{
    const st=stock[s]||0,nd=needed[s]||0,buy=Math.max(0,nd-st);
    return{dia:s,stock:st,needed:nd,fromStock:Math.min(st,nd),buy};
  }).filter(r=>r.stock>0||r.needed>0);
}

      <tr style="border-top:1px solid var(--bdr)">

      <tr style="border-top:1px solid var(--bdr)">

    // Pricing summary
    if(cropZones.some(z=>z.pricePerTree>0)){

      cropZones.forEach(z=>{
